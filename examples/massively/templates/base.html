<!DOCTYPE HTML>
<!--
  Massively by HTML5 UP — used under CCA 3.0 license (html5up.net/license)
  Adapted for "Wild & Still" — a PureSimple example app
-->
<html>
<head>
  <title>{% block title %}{{ site_name }}{% endblock %}</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <link rel="stylesheet" href="/static/css/main.css" />
  <link rel="stylesheet" href="/static/css/fontawesome-all.min.css" />
  <noscript><link rel="stylesheet" href="/static/css/noscript.css" /></noscript>
</head>
<body class="is-preload">

  <!-- Wrapper -->
  <div id="wrapper" class="fade-in">

    <!-- Intro -->
    <div id="intro">
      <h1>{{ site_name }}</h1>
      <p>{{ tagline }}</p>
      <ul class="actions">
        <li><a href="#header" class="button icon solid solo fa-arrow-down scrolly">Continue</a></li>
      </ul>
    </div>

    <!-- Header -->
    <header id="header">
      <a href="/" class="logo">{{ site_name }}</a>
    </header>

    <!-- Nav -->
    <nav id="nav">
      <ul class="links">
        <li{% if active_page == 'home' %} class="active"{% endif %}><a href="/">Stories</a></li>
        <li{% if active_page == 'contact' %} class="active"{% endif %}><a href="/contact">Contact</a></li>
        <li><a href="/admin/">Admin</a></li>
      </ul>
      <ul class="icons">
        <li><a href="#" class="icon brands fa-instagram"><span class="label">Instagram</span></a></li>
      </ul>
    </nav>

    <!-- Main -->
    <div id="main">
      {% block content %}{% endblock %}
    </div>

    <!-- Footer -->
    <footer id="footer">
      <section class="split contact">
        <section>
          <h3>By</h3>
          <p>Jedt Sitth — nature photography &amp; long-form essays</p>
        </section>
        <section>
          <h3>Social</h3>
          <ul class="icons alt">
            <li><a href="#" class="icon brands alt fa-instagram"><span class="label">Instagram</span></a></li>
          </ul>
        </section>
      </section>
    </footer>

    <!-- Copyright -->
    <div id="copyright">
      <ul>
        <li>&copy; Jedt Sitth</li>
        <li>Design: <a href="https://html5up.net">HTML5 UP</a></li>
        <li>Powered by <a href="https://github.com/Jedt3D/PureSimple">PureSimple</a></li>
      </ul>
    </div>

  </div>

  <!-- Scripts -->
  <script src="/static/js/jquery.min.js"></script>
  <script src="/static/js/jquery.scrollex.min.js"></script>
  <script src="/static/js/jquery.scrolly.min.js"></script>
  <script src="/static/js/browser.min.js"></script>
  <script src="/static/js/breakpoints.min.js"></script>
  <script src="/static/js/util.js"></script>
  <script src="/static/js/main.js"></script>

</body>
</html>
