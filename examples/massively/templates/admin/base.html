<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>{% block title %}Admin{% endblock %} — Wild &amp; Still</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/css/tabler.min.css" />
</head>
<body class="antialiased">
<div class="wrapper">

  <!-- Navbar -->
  <header class="navbar navbar-expand-md navbar-dark d-print-none">
    <div class="container-xl">
      <a href="/admin/" class="navbar-brand navbar-brand-autodark">
        <strong>Wild &amp; Still</strong> <span class="text-muted ms-2 small">Admin</span>
      </a>
      <div class="navbar-nav flex-row ms-auto">
        <div class="nav-item">
          <a href="/" class="nav-link" target="_blank">
            View Site <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24"
              viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none">
              <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
              <path d="M11 7h-5a2 2 0 0 0 -2 2v9a2 2 0 0 0 2 2h9a2 2 0 0 0 2 -2v-5"/>
              <path d="M10 14l10 -10"/><path d="M15 4l5 0l0 5"/>
            </svg>
          </a>
        </div>
      </div>
    </div>
  </header>

  <!-- Sidenav -->
  <div class="navbar-expand-md">
    <div class="collapse navbar-collapse" id="navbar-menu">
      <div class="navbar navbar-light">
        <div class="container-xl">
          <ul class="navbar-nav">
            <li class="nav-item{% if active_admin == 'dashboard' %} active{% endif %}">
              <a class="nav-link" href="/admin/">
                <span class="nav-link-icon">📊</span>
                <span class="nav-link-title">Dashboard</span>
              </a>
            </li>
            <li class="nav-item{% if active_admin == 'posts' %} active{% endif %}">
              <a class="nav-link" href="/admin/posts">
                <span class="nav-link-icon">📝</span>
                <span class="nav-link-title">Posts</span>
              </a>
            </li>
            <li class="nav-item{% if active_admin == 'contacts' %} active{% endif %}">
              <a class="nav-link" href="/admin/contacts">
                <span class="nav-link-icon">✉️</span>
                <span class="nav-link-title">Contacts</span>
                {% if unread_count != '0' and unread_count != '' %}
                <span class="badge bg-red">{{ unread_count }}</span>
                {% endif %}
              </a>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <!-- Page content -->
  <div class="page-wrapper">
    <div class="container-xl">
      <div class="page-header">
        <div class="row align-items-center">
          <div class="col-auto">
            <h2 class="page-title">{% block page_title %}{% endblock %}</h2>
          </div>
          {% block page_actions %}{% endblock %}
        </div>
      </div>
      <div class="page-body">
        {% block content %}{% endblock %}
      </div>
    </div>
  </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/js/tabler.min.js"></script>
</body>
</html>
