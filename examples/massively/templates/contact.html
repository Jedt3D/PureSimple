{% extends "base.html" %}

{% block title %}Contact — {{ site_name }}{% endblock %}

{% block content %}
<section>
  <header class="major">
    <h1>Say hello</h1>
    <p>Have a question about a shot, a location, or just want to share a story?</p>
  </header>

  {% if error %}
  <div class="box" style="border-color:#e74c3c;color:#e74c3c;">
    <p>{{ error }}</p>
  </div>
  {% endif %}

  <form method="post" action="/contact">
    <div class="fields">
      <div class="field half">
        <label for="name">Name</label>
        <input type="text" name="name" id="name" placeholder="Your name" required />
      </div>
      <div class="field half">
        <label for="email">Email</label>
        <input type="email" name="email" id="email" placeholder="your@email.com" required />
      </div>
      <div class="field">
        <label for="message">Message</label>
        <textarea name="message" id="message" rows="6" placeholder="Your message..." required></textarea>
      </div>
    </div>
    <ul class="actions">
      <li><input type="submit" value="Send Message" class="primary" /></li>
    </ul>
  </form>
</section>
{% endblock %}
