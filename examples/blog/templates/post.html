<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ title }} — {{ site_name }}</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 4vh auto; padding: 0 1.5rem; color: #222; }
    nav  { margin-bottom: 2rem; }
    nav a { margin-right: 1rem; color: #0057b7; text-decoration: none; }
    .meta { color: #888; font-size: 0.9rem; margin-bottom: 1.5rem; }
    p.body { line-height: 1.7; }
  </style>
</head>
<body>
  <nav><a href="/">← Home</a><a href="/about">About</a></nav>
  <h1>{{ title }}</h1>
  <p class="meta">By {{ author }} on {{ date }}</p>
  <p class="body">{{ body }}</p>
</body>
</html>
