<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <!-- Background -->
  <rect width="800" height="380" fill="#FFFEF0" rx="8"/>
  <!-- Outer border -->
  <rect x="2" y="2" width="796" height="376" fill="none" stroke="#1a1a1a" stroke-width="4" rx="6"/>

  <!-- Top title banner -->
  <rect x="2" y="4" width="796" height="60" fill="#1a1a1a" rx="6"/>
  <rect x="2" y="46" width="796" height="18" fill="#1a1a1a"/>
  <text x="400" y="42" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="22" fill="#FFE000" text-anchor="middle">Chapter 12: Building HTML Applications</text>

  <!-- Panel divider -->
  <line x1="400" y1="68" x2="400" y2="330" stroke="#1a1a1a" stroke-width="3"/>

  <!-- === LEFT PANEL: Developer writes code === -->
  <!-- Panel label -->
  <text x="200" y="90" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="14" fill="#1a1a1a" text-anchor="middle">Handler + Template</text>

  <!-- Handler code box -->
  <rect x="30" y="100" width="165" height="110" fill="#F0F0F0" stroke="#888" stroke-width="1" rx="4"/>
  <rect x="30" y="100" width="165" height="20" fill="#27AE60" rx="4"/>
  <rect x="30" y="112" width="165" height="8" fill="#27AE60"/>
  <text x="112" y="114" font-family="Arial, sans-serif" font-weight="700" font-size="11" fill="white" text-anchor="middle">handler.pb</text>
  <text x="40" y="133" font-family="Courier New, monospace" font-size="10" fill="#1a1a1a">GET "/posts", postList</text>
  <text x="40" y="149" font-family="Courier New, monospace" font-size="10" fill="#1a1a1a">Procedure postList(*c)</text>
  <text x="40" y="165" font-family="Courier New, monospace" font-size="10" fill="#1a1a1a">  posts = getPosts()</text>
  <text x="40" y="181" font-family="Courier New, monospace" font-size="10" fill="#1a1a1a">  HTML(*c, "list.html")</text>
  <text x="40" y="197" font-family="Courier New, monospace" font-size="10" fill="#1a1a1a">EndProcedure</text>

  <!-- Template file box -->
  <rect x="210" y="100" width="155" height="110" fill="#F0F0F0" stroke="#888" stroke-width="1" rx="4"/>
  <rect x="210" y="100" width="155" height="20" fill="#F39C12" rx="4"/>
  <rect x="210" y="112" width="155" height="8" fill="#F39C12"/>
  <text x="287" y="114" font-family="Arial, sans-serif" font-weight="700" font-size="11" fill="white" text-anchor="middle">list.html</text>
  <text x="220" y="133" font-family="Courier New, monospace" font-size="10" fill="#8E44AD">{% extends "base.html" %}</text>
  <text x="220" y="149" font-family="Courier New, monospace" font-size="10" fill="#8E44AD">{% block content %}</text>
  <text x="220" y="165" font-family="Courier New, monospace" font-size="10" fill="#1a1a1a">{% for p in posts %}</text>
  <text x="220" y="181" font-family="Courier New, monospace" font-size="10" fill="#1a1a1a">  {{ p.title }}</text>
  <text x="220" y="197" font-family="Courier New, monospace" font-size="10" fill="#8E44AD">{% endblock %}</text>

  <!-- Developer character (left panel) -->
  <rect x="148" y="228" width="22" height="40" fill="#4A90D9" stroke="#1a1a1a" stroke-width="2" rx="4"/>
  <circle cx="159" cy="216" r="16" fill="#FFDAB9" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="153" cy="214" r="2" fill="#1a1a1a"/>
  <circle cx="165" cy="214" r="2" fill="#1a1a1a"/>
  <path d="M154 221 Q159 226 164 221" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Arms typing -->
  <line x1="148" y1="238" x2="120" y2="248" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="170" y1="238" x2="198" y2="248" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Legs -->
  <line x1="153" y1="268" x2="149" y2="295" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="165" y1="268" x2="169" y2="295" stroke="#1a1a1a" stroke-width="2"/>

  <!-- === ARROW CENTER === -->
  <line x1="370" y1="180" x2="418" y2="180" stroke="#E74C3C" stroke-width="3"/>
  <polygon points="418,174 432,180 418,186" fill="#E74C3C"/>
  <text x="401" y="173" font-family="Arial, sans-serif" font-size="11" fill="#E74C3C" text-anchor="middle" font-weight="700">HTTP</text>

  <!-- === RIGHT PANEL: Browser showing rendered page === -->
  <text x="600" y="90" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="14" fill="#1a1a1a" text-anchor="middle">Rendered in Browser</text>

  <!-- Browser window -->
  <rect x="420" y="100" width="340" height="210" fill="white" stroke="#1a1a1a" stroke-width="2" rx="6"/>
  <!-- Browser chrome -->
  <rect x="420" y="100" width="340" height="28" fill="#E0E0E0" rx="6"/>
  <rect x="420" y="118" width="340" height="10" fill="#E0E0E0"/>
  <!-- Browser dots -->
  <circle cx="438" cy="114" r="5" fill="#E74C3C"/>
  <circle cx="454" cy="114" r="5" fill="#F39C12"/>
  <circle cx="470" cy="114" r="5" fill="#27AE60"/>
  <!-- URL bar -->
  <rect x="484" y="107" width="200" height="14" fill="white" stroke="#aaa" stroke-width="1" rx="3"/>
  <text x="584" y="119" font-family="Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">localhost:8080/posts</text>
  <!-- Navbar -->
  <rect x="420" y="128" width="340" height="28" fill="#4A90D9"/>
  <text x="450" y="147" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="700">MyBlog</text>
  <text x="660" y="147" font-family="Arial, sans-serif" font-size="11" fill="white">Home  Posts  About</text>
  <!-- Article content -->
  <rect x="430" y="162" width="310" height="50" fill="#f8f8f8" stroke="#ddd" stroke-width="1" rx="3"/>
  <text x="440" y="178" font-family="Arial, sans-serif" font-size="12" fill="#1a1a1a" font-weight="700">Getting Started with PureBasic</text>
  <text x="440" y="196" font-family="Arial, sans-serif" font-size="10" fill="#555">Posted by Alice — March 2026</text>
  <rect x="430" y="220" width="310" height="50" fill="#f8f8f8" stroke="#ddd" stroke-width="1" rx="3"/>
  <text x="440" y="236" font-family="Arial, sans-serif" font-size="12" fill="#1a1a1a" font-weight="700">Building REST APIs</text>
  <text x="440" y="254" font-family="Arial, sans-serif" font-size="10" fill="#555">Posted by Bob — February 2026</text>
  <!-- Footer -->
  <rect x="420" y="282" width="340" height="28" fill="#1a1a1a" rx="0"/>
  <rect x="420" y="282" width="340" height="28" fill="#1a1a1a"/>
  <text x="590" y="300" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">© 2026 MyBlog — Powered by PureSimple</text>

  <!-- Bottom caption bar -->
  <rect x="2" y="330" width="796" height="46" fill="#1a1a1a" rx="6"/>
  <rect x="2" y="330" width="796" height="10" fill="#1a1a1a"/>
  <text x="400" y="358" font-family="Arial, sans-serif" font-size="15" fill="white" text-anchor="middle">From handler to browser: the HTML application lifecycle.</text>
</svg>
