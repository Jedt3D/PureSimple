<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <!-- Background -->
  <rect width="800" height="380" fill="#FFFEF0" rx="8"/>
  <!-- Outer border -->
  <rect x="2" y="2" width="796" height="376" fill="none" stroke="#1a1a1a" stroke-width="4" rx="6"/>
  <!-- Top title banner -->
  <rect x="2" y="4" width="796" height="60" fill="#1a1a1a" rx="6"/>
  <rect x="2" y="40" width="796" height="24" fill="#1a1a1a"/>
  <text x="400" y="42" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="22" fill="#FFE000" text-anchor="middle" dominant-baseline="middle">Chapter 20: Testing</text>

  <!-- ===== SINGLE WIDE PANEL ===== -->

  <!-- ===== LEFT SIDE: Developer at terminal running tests ===== -->

  <!-- Terminal / laptop screen -->
  <rect x="28" y="80" width="260" height="200" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="3" rx="6"/>
  <rect x="34" y="86" width="248" height="188" fill="#1a1a1a" rx="3"/>
  <!-- Terminal title bar -->
  <rect x="34" y="86" width="248" height="18" fill="#333" rx="3"/>
  <circle cx="45" cy="95" r="4" fill="#E74C3C"/>
  <circle cx="57" cy="95" r="4" fill="#FFE000"/>
  <circle cx="69" cy="95" r="4" fill="#27AE60"/>
  <text x="158" y="99" font-family="Arial, sans-serif" font-size="10" fill="#888" text-anchor="middle">run_all</text>
  <!-- Terminal text -->
  <text x="42" y="120" font-family="monospace, Arial, sans-serif" font-size="10" fill="#4A90D9">$ ./run_all</text>
  <text x="42" y="136" font-family="monospace, Arial, sans-serif" font-size="10" fill="#888">Running test suite...</text>
  <text x="42" y="152" font-family="monospace, Arial, sans-serif" font-size="10" fill="#27AE60">PASS Router::Match basic</text>
  <text x="42" y="166" font-family="monospace, Arial, sans-serif" font-size="10" fill="#27AE60">PASS Ctx::Advance chain</text>
  <text x="42" y="180" font-family="monospace, Arial, sans-serif" font-size="10" fill="#E74C3C">FAIL Binding::BindJSON</text>
  <text x="42" y="194" font-family="monospace, Arial, sans-serif" font-size="10" fill="#27AE60">PASS Render::JSON output</text>
  <text x="42" y="208" font-family="monospace, Arial, sans-serif" font-size="10" fill="#27AE60">PASS CSRF token match</text>
  <text x="42" y="228" font-family="monospace, Arial, sans-serif" font-size="9" fill="#888">─────────────────────────</text>
  <text x="42" y="244" font-family="monospace, Arial, sans-serif" font-size="10" fill="white">Tests: 264  Pass: 263</text>
  <text x="42" y="258" font-family="monospace, Arial, sans-serif" font-size="10" fill="#E74C3C">Failures: 1</text>
  <!-- Blinking cursor -->
  <rect x="42" y="265" width="8" height="12" fill="#27AE60"/>
  <!-- Laptop base -->
  <rect x="16" y="280" width="284" height="14" fill="#888" stroke="#1a1a1a" stroke-width="2" rx="3"/>
  <rect x="110" y="280" width="96" height="8" fill="#666" rx="2"/>

  <!-- Developer character (focused) -->
  <!-- Body -->
  <rect x="310" y="200" width="22" height="42" fill="#4A90D9" stroke="#1a1a1a" stroke-width="2" rx="4"/>
  <!-- Head -->
  <circle cx="321" cy="188" r="18" fill="#F39C12" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Focused eyes (squinting) -->
  <path d="M314 186 Q317 184 320 186" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <path d="M322 186 Q325 184 328 186" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <!-- Neutral/focused mouth -->
  <line x1="315" y1="194" x2="327" y2="194" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Arms -->
  <line x1="310" y1="210" x2="288" y2="222" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="332" y1="210" x2="354" y2="218" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Legs -->
  <line x1="314" y1="242" x2="310" y2="270" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="328" y1="242" x2="332" y2="270" stroke="#1a1a1a" stroke-width="2"/>

  <!-- ===== RIGHT SIDE: Three green checkmarks floating ===== -->

  <!-- Checkmark 1: Check(result) -->
  <circle cx="480" cy="130" r="32" fill="#27AE60" stroke="#1a1a1a" stroke-width="3"/>
  <polyline points="463,130 474,142 498,115" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Code box under checkmark 1 -->
  <rect x="430" y="170" width="140" height="30" fill="#F0F0F0" stroke="#888" stroke-width="1" rx="4"/>
  <text x="500" y="190" font-family="monospace, Arial, sans-serif" font-size="12" fill="#1a1a1a" text-anchor="middle" font-weight="bold">Check(result)</text>

  <!-- Checkmark 2: CheckStr(a, b) -->
  <circle cx="630" cy="130" r="32" fill="#27AE60" stroke="#1a1a1a" stroke-width="3"/>
  <polyline points="613,130 624,142 648,115" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Code box under checkmark 2 -->
  <rect x="576" y="170" width="148" height="30" fill="#F0F0F0" stroke="#888" stroke-width="1" rx="4"/>
  <text x="650" y="190" font-family="monospace, Arial, sans-serif" font-size="12" fill="#1a1a1a" text-anchor="middle" font-weight="bold">CheckStr(a, b)</text>

  <!-- Checkmark 3: CheckEqual(x, 42) -->
  <circle cx="555" cy="230" r="32" fill="#27AE60" stroke="#1a1a1a" stroke-width="3"/>
  <polyline points="538,230 549,242 573,215" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Code box under checkmark 3 -->
  <rect x="492" y="270" width="168" height="30" fill="#F0F0F0" stroke="#888" stroke-width="1" rx="4"/>
  <text x="576" y="290" font-family="monospace, Arial, sans-serif" font-size="12" fill="#1a1a1a" text-anchor="middle" font-weight="bold">CheckEqual(x, 42)</text>

  <!-- Small red X (crossed out, shown smaller to indicate it's not stopping anything) -->
  <circle cx="746" cy="200" r="20" fill="#E74C3C" stroke="#1a1a1a" stroke-width="2" opacity="0.6"/>
  <line x1="736" y1="190" x2="756" y2="210" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <line x1="756" y1="190" x2="736" y2="210" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <!-- Strike-through over the X -->
  <line x1="726" y1="180" x2="770" y2="225" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>

  <!-- Robot helper character (writing results) -->
  <!-- Robot body -->
  <rect x="680" y="232" width="30" height="40" fill="#888" stroke="#1a1a1a" stroke-width="2" rx="3"/>
  <!-- Robot head -->
  <rect x="675" y="212" width="40" height="28" fill="#888" stroke="#1a1a1a" stroke-width="2" rx="4"/>
  <!-- Robot eyes (LED style) -->
  <rect x="681" y="220" width="8" height="6" fill="#27AE60" rx="1"/>
  <rect x="695" y="220" width="8" height="6" fill="#27AE60" rx="1"/>
  <!-- Robot mouth (grid) -->
  <rect x="682" y="230" width="26" height="6" fill="#1a1a1a" rx="1"/>
  <line x1="689" y1="230" x2="689" y2="236" stroke="#888" stroke-width="1"/>
  <line x1="695" y1="230" x2="695" y2="236" stroke="#888" stroke-width="1"/>
  <line x1="701" y1="230" x2="701" y2="236" stroke="#888" stroke-width="1"/>
  <!-- Robot antenna -->
  <line x1="695" y1="212" x2="695" y2="200" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="695" cy="198" r="4" fill="#FFE000" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Robot arm writing -->
  <line x1="680" y1="248" x2="660" y2="258" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Notebook -->
  <rect x="630" y="250" width="50" height="40" fill="white" stroke="#1a1a1a" stroke-width="2" rx="2"/>
  <rect x="630" y="250" width="8" height="40" fill="#4A90D9" rx="2"/>
  <line x1="642" y1="260" x2="676" y2="260" stroke="#888" stroke-width="1"/>
  <line x1="642" y1="270" x2="676" y2="270" stroke="#888" stroke-width="1"/>
  <line x1="642" y1="280" x2="676" y2="280" stroke="#888" stroke-width="1"/>
  <!-- Pencil -->
  <line x1="658" y1="255" x2="648" y2="260" stroke="#F39C12" stroke-width="3" stroke-linecap="round"/>
  <!-- Robot other arm -->
  <line x1="710" y1="248" x2="726" y2="258" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Robot legs -->
  <line x1="686" y1="272" x2="682" y2="295" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="700" y1="272" x2="704" y2="295" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Bottom caption bar -->
  <rect x="2" y="330" width="796" height="46" fill="#1a1a1a" rx="6"/>
  <rect x="2" y="330" width="796" height="10" fill="#1a1a1a"/>
  <text x="400" y="358" font-family="Arial, sans-serif" font-size="15" fill="white" text-anchor="middle">Tests that count failures instead of halting on the first.</text>
</svg>
