<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <!-- Background -->
  <rect width="800" height="380" fill="#FFFEF0" rx="8"/>
  <!-- Outer border -->
  <rect x="2" y="2" width="796" height="376" fill="none" stroke="#1a1a1a" stroke-width="4" rx="6"/>
  <!-- Top title banner -->
  <rect x="2" y="4" width="796" height="60" fill="#1a1a1a" rx="6"/>
  <rect x="2" y="40" width="796" height="24" fill="#1a1a1a"/>
  <text x="400" y="42" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="22" fill="#FFE000" text-anchor="middle" dominant-baseline="middle">Chapter 1: Why PureBasic for the Web?</text>

  <!-- Panel divider -->
  <line x1="400" y1="64" x2="400" y2="330" stroke="#1a1a1a" stroke-width="3"/>

  <!-- ===== LEFT PANEL: Developer drowning in node_modules ===== -->
  <!-- Panel background hint -->
  <rect x="4" y="64" width="394" height="264" fill="#FFFEF0"/>

  <!-- Stacked dependency boxes -->
  <!-- Box stack base -->
  <rect x="60" y="210" width="72" height="22" fill="#E74C3C" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="96" y="225" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">webpack</text>

  <rect x="55" y="186" width="72" height="22" fill="#E74C3C" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="91" y="201" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">lodash</text>

  <rect x="62" y="162" width="72" height="22" fill="#E74C3C" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="98" y="177" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">express</text>

  <rect x="50" y="138" width="80" height="22" fill="#E74C3C" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="90" y="153" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">babel-core</text>

  <rect x="57" y="114" width="72" height="22" fill="#E74C3C" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="93" y="129" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">eslint</text>

  <rect x="45" y="90" width="88" height="22" fill="#E74C3C" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="89" y="105" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">node_modules</text>

  <!-- Tilted boxes to show chaos -->
  <rect x="150" y="185" width="60" height="20" fill="#F39C12" stroke="#1a1a1a" stroke-width="1.5" rx="2" transform="rotate(-8 180 195)"/>
  <text x="180" y="199" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle" transform="rotate(-8 180 195)">react</text>

  <rect x="148" y="215" width="60" height="20" fill="#F39C12" stroke="#1a1a1a" stroke-width="1.5" rx="2" transform="rotate(5 178 225)"/>
  <text x="178" y="229" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle" transform="rotate(5 178 225)">axios</text>

  <rect x="155" y="155" width="60" height="20" fill="#8E44AD" stroke="#1a1a1a" stroke-width="1.5" rx="2" transform="rotate(10 185 165)"/>
  <text x="185" y="169" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle" transform="rotate(10 185 165)">moment</text>

  <!-- Developer character (panicked) left panel -->
  <!-- Body -->
  <rect x="268" y="195" width="22" height="42" fill="#4A90D9" stroke="#1a1a1a" stroke-width="2" rx="4"/>
  <!-- Head -->
  <circle cx="279" cy="183" r="18" fill="#F39C12" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Panicked eyes (wide open) -->
  <circle cx="273" cy="181" r="4" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="285" cy="181" r="4" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="274" cy="182" r="2" fill="#1a1a1a"/>
  <circle cx="286" cy="182" r="2" fill="#1a1a1a"/>
  <!-- Worried mouth -->
  <path d="M273 190 Q279 187 285 190" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <!-- Sweat drop -->
  <ellipse cx="295" cy="174" rx="4" ry="6" fill="#4A90D9" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Arms out (panicked) -->
  <line x1="268" y1="205" x2="248" y2="220" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="290" y1="205" x2="310" y2="215" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Legs -->
  <line x1="272" y1="237" x2="268" y2="265" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="286" y1="237" x2="290" y2="265" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Speech bubble left -->
  <rect x="210" y="130" width="130" height="36" fill="white" stroke="#1a1a1a" stroke-width="2" rx="8"/>
  <polygon points="270,166 264,178 280,166" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="271,167 265,177 279,167" fill="white"/>
  <text x="275" y="151" font-family="Arial, sans-serif" font-size="14" fill="#1a1a1a" text-anchor="middle" font-weight="bold">Which version?!</text>

  <!-- ===== RIGHT PANEL: Happy developer with single binary ===== -->
  <rect x="402" y="64" width="394" height="264" fill="#FFFEF0"/>

  <!-- Single app box (triumphant) -->
  <rect x="490" y="175" width="100" height="52" fill="#27AE60" stroke="#1a1a1a" stroke-width="2" rx="4"/>
  <text x="540" y="198" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="bold">app</text>
  <text x="540" y="216" font-family="Arial, sans-serif" font-size="11" fill="#FFFEF0" text-anchor="middle">(2 MB)</text>
  <!-- Sparkle marks around box -->
  <text x="475" y="178" font-family="Arial, sans-serif" font-size="18" fill="#FFE000">★</text>
  <text x="598" y="185" font-family="Arial, sans-serif" font-size="14" fill="#FFE000">★</text>
  <text x="490" y="240" font-family="Arial, sans-serif" font-size="12" fill="#FFE000">✦</text>

  <!-- Developer character (happy) right panel -->
  <!-- Body -->
  <rect x="640" y="195" width="22" height="42" fill="#4A90D9" stroke="#1a1a1a" stroke-width="2" rx="4"/>
  <!-- Head -->
  <circle cx="651" cy="183" r="18" fill="#F39C12" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Happy eyes -->
  <path d="M645 180 Q647 177 649 180" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <path d="M653 180 Q655 177 657 180" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <!-- Big smile -->
  <path d="M644 188 Q651 196 658 188" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <!-- Thumbs up arm -->
  <line x1="640" y1="205" x2="622" y2="218" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="618" cy="220" r="5" fill="#F39C12" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Other arm down relaxed -->
  <line x1="662" y1="205" x2="676" y2="222" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Legs -->
  <line x1="644" y1="237" x2="640" y2="265" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="658" y1="237" x2="662" y2="265" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Speech bubble right -->
  <rect x="555" y="125" width="140" height="42" fill="white" stroke="#1a1a1a" stroke-width="2" rx="8"/>
  <polygon points="620,167 614,180 630,167" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="621,168 615,179 629,168" fill="white"/>
  <text x="625" y="144" font-family="Arial, sans-serif" font-size="14" fill="#1a1a1a" text-anchor="middle" font-weight="bold">One file.</text>
  <text x="625" y="162" font-family="Arial, sans-serif" font-size="14" fill="#27AE60" text-anchor="middle" font-weight="bold">Done.</text>

  <!-- Bottom caption bar -->
  <rect x="2" y="330" width="796" height="46" fill="#1a1a1a" rx="6"/>
  <rect x="2" y="330" width="796" height="10" fill="#1a1a1a"/>
  <text x="400" y="358" font-family="Arial, sans-serif" font-size="15" fill="white" text-anchor="middle">Zero dependencies. One binary. Just ship it.</text>
</svg>
