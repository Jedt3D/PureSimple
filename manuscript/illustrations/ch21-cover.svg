<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <!-- Background -->
  <rect width="800" height="380" fill="#FFFEF0" rx="8"/>
  <!-- Outer border -->
  <rect x="2" y="2" width="796" height="376" fill="none" stroke="#1a1a1a" stroke-width="4" rx="6"/>
  <!-- Top title banner -->
  <rect x="2" y="4" width="796" height="60" fill="#1a1a1a" rx="6"/>
  <rect x="2" y="40" width="796" height="24" fill="#1a1a1a"/>
  <text x="400" y="42" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="22" fill="#FFE000" text-anchor="middle" dominant-baseline="middle">Chapter 21: Building a REST API</text>

  <!-- ===== SINGLE WIDE PANEL ===== -->

  <!-- Client icon (left side) -->
  <!-- Monitor body -->
  <rect x="42" y="110" width="90" height="62" fill="#4A90D9" stroke="#1a1a1a" stroke-width="2" rx="4"/>
  <rect x="50" y="118" width="74" height="46" fill="#1a1a1a" rx="2"/>
  <text x="87" y="140" font-family="Arial, sans-serif" font-size="10" fill="#27AE60" text-anchor="middle">{client}</text>
  <text x="87" y="154" font-family="Arial, sans-serif" font-size="9" fill="#FFE000" text-anchor="middle">curl / fetch</text>
  <!-- Monitor stand -->
  <rect x="78" y="172" width="18" height="10" fill="#4A90D9" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="66" y="182" width="42" height="6" fill="#4A90D9" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>

  <!-- API Endpoint Table (center) -->
  <!-- Table background -->
  <rect x="200" y="80" width="390" height="230" fill="white" stroke="#1a1a1a" stroke-width="2" rx="6"/>
  <!-- Table header -->
  <rect x="200" y="80" width="390" height="32" fill="#1a1a1a" rx="4"/>
  <rect x="200" y="96" width="390" height="16" fill="#1a1a1a"/>
  <text x="395" y="100" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="14" fill="#FFE000" text-anchor="middle">API Endpoints</text>

  <!-- Row 1: GET /todos -->
  <rect x="200" y="112" width="390" height="40" fill="#E8F5E9"/>
  <rect x="202" y="113" width="68" height="38" fill="#27AE60" rx="3"/>
  <text x="236" y="136" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="14" fill="white" text-anchor="middle">GET</text>
  <text x="360" y="132" font-family="Arial, monospace, sans-serif" font-size="14" fill="#1a1a1a" text-anchor="middle">/todos</text>
  <text x="540" y="132" font-family="Arial, sans-serif" font-size="13" fill="#27AE60" text-anchor="middle">→ list all</text>
  <line x1="200" y1="152" x2="590" y2="152" stroke="#ccc" stroke-width="1"/>

  <!-- Row 2: POST /todos -->
  <rect x="200" y="152" width="390" height="40" fill="#FFFEF0"/>
  <rect x="202" y="153" width="68" height="38" fill="#F39C12" rx="3"/>
  <text x="236" y="176" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="13" fill="white" text-anchor="middle">POST</text>
  <text x="360" y="172" font-family="Arial, monospace, sans-serif" font-size="14" fill="#1a1a1a" text-anchor="middle">/todos</text>
  <text x="540" y="172" font-family="Arial, sans-serif" font-size="13" fill="#F39C12" text-anchor="middle">→ create</text>
  <line x1="200" y1="192" x2="590" y2="192" stroke="#ccc" stroke-width="1"/>

  <!-- Row 3: PUT /todos/:id -->
  <rect x="200" y="192" width="390" height="40" fill="#E8F5E9"/>
  <rect x="202" y="193" width="68" height="38" fill="#4A90D9" rx="3"/>
  <text x="236" y="216" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="14" fill="white" text-anchor="middle">PUT</text>
  <text x="360" y="212" font-family="Arial, monospace, sans-serif" font-size="13" fill="#1a1a1a" text-anchor="middle">/todos/:id</text>
  <text x="540" y="212" font-family="Arial, sans-serif" font-size="13" fill="#4A90D9" text-anchor="middle">→ update</text>
  <line x1="200" y1="232" x2="590" y2="232" stroke="#ccc" stroke-width="1"/>

  <!-- Row 4: DELETE /todos/:id -->
  <rect x="200" y="232" width="390" height="40" fill="#FFFEF0"/>
  <rect x="202" y="233" width="68" height="38" fill="#E74C3C" rx="3"/>
  <text x="236" y="256" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="12" fill="white" text-anchor="middle">DEL</text>
  <text x="360" y="252" font-family="Arial, monospace, sans-serif" font-size="13" fill="#1a1a1a" text-anchor="middle">/todos/:id</text>
  <text x="540" y="252" font-family="Arial, sans-serif" font-size="13" fill="#E74C3C" text-anchor="middle">→ delete</text>
  <line x1="200" y1="272" x2="590" y2="272" stroke="#ccc" stroke-width="1"/>

  <!-- JSON response snippet below table -->
  <rect x="210" y="278" width="370" height="26" fill="#F0F0F0" stroke="#888" stroke-width="1" rx="3"/>
  <text x="395" y="295" font-family="Arial, monospace, sans-serif" font-size="12" fill="#1a1a1a" text-anchor="middle">{"id":1,"title":"Buy milk","done":false}</text>

  <!-- Request arrows from client to table -->
  <line x1="135" y1="141" x2="196" y2="141" stroke="#4A90D9" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="196,136 208,141 196,146" fill="#4A90D9"/>

  <!-- Response arrow from table to client -->
  <line x1="196" y1="175" x2="135" y2="175" stroke="#27AE60" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="135,170 123,175 135,180" fill="#27AE60"/>

  <!-- Request label -->
  <text x="165" y="135" font-family="Arial, sans-serif" font-size="11" fill="#4A90D9" text-anchor="middle">request</text>
  <text x="165" y="191" font-family="Arial, sans-serif" font-size="11" fill="#27AE60" text-anchor="middle">response</text>

  <!-- Developer character (smiling) on right -->
  <!-- Body -->
  <rect x="638" y="195" width="22" height="42" fill="#4A90D9" stroke="#1a1a1a" stroke-width="2" rx="4"/>
  <!-- Head -->
  <circle cx="649" cy="183" r="18" fill="#F39C12" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Happy eyes -->
  <path d="M643 180 Q645 177 647 180" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <path d="M651 180 Q653 177 655 180" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <!-- Big smile -->
  <path d="M642 188 Q649 196 656 188" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <!-- Arm pointing at table -->
  <line x1="638" y1="205" x2="610" y2="200" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="610,196 596,200 610,204" fill="#1a1a1a"/>
  <!-- Other arm -->
  <line x1="660" y1="210" x2="676" y2="225" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Legs -->
  <line x1="642" y1="237" x2="638" y2="268" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="656" y1="237" x2="660" y2="268" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Speech bubble -->
  <rect x="610" y="118" width="148" height="44" fill="white" stroke="#1a1a1a" stroke-width="2" rx="8"/>
  <polygon points="648,162 642,174 658,162" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="649,163 643,173 657,163" fill="white"/>
  <text x="684" y="137" font-family="Arial, sans-serif" font-size="13" fill="#1a1a1a" text-anchor="middle" font-weight="bold">So clean!</text>
  <text x="684" y="155" font-family="Arial, sans-serif" font-size="12" fill="#27AE60" text-anchor="middle">Predictable URLs.</text>

  <!-- Bottom caption bar -->
  <rect x="2" y="330" width="796" height="46" fill="#1a1a1a" rx="6"/>
  <rect x="2" y="330" width="796" height="10" fill="#1a1a1a"/>
  <text x="400" y="358" font-family="Arial, sans-serif" font-size="15" fill="white" text-anchor="middle">REST: four verbs, predictable URLs, stateless.</text>
</svg>
