<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <!-- Background -->
  <rect width="800" height="380" fill="#FFFEF0" rx="8"/>
  <!-- Outer border -->
  <rect x="2" y="2" width="796" height="376" fill="none" stroke="#1a1a1a" stroke-width="4" rx="6"/>

  <!-- Top title banner -->
  <rect x="2" y="2" width="796" height="60" fill="#1a1a1a" rx="6"/>
  <rect x="2" y="50" width="796" height="14" fill="#1a1a1a"/>
  <text x="400" y="42" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="23" fill="#FFE000" text-anchor="middle">CHAPTER 6: THE REQUEST CONTEXT</text>

  <!-- Bottom caption bar -->
  <rect x="2" y="330" width="796" height="46" fill="#1a1a1a"/>
  <rect x="2" y="328" width="796" height="6" fill="#1a1a1a"/>
  <text x="400" y="358" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF" text-anchor="middle">RequestContext: the backpack that carries your request.</text>

  <!-- Developer character body -->
  <!-- Head -->
  <circle cx="200" cy="130" r="26" fill="#F5CBA7" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Eyes -->
  <circle cx="192" cy="126" r="3" fill="#1a1a1a"/>
  <circle cx="208" cy="126" r="3" fill="#1a1a1a"/>
  <!-- Smile -->
  <path d="M192 137 Q200 143 208 137" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <!-- Body -->
  <rect x="183" y="156" width="34" height="55" fill="#4A90D9" stroke="#1a1a1a" stroke-width="2" rx="4"/>
  <!-- Arms -->
  <line x1="183" y1="165" x2="158" y2="185" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="217" y1="165" x2="242" y2="185" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Legs -->
  <line x1="193" y1="211" x2="185" y2="245" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="207" y1="211" x2="215" y2="245" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Feet -->
  <rect x="178" y="244" width="18" height="8" fill="#1a1a1a" rx="3"/>
  <rect x="208" y="244" width="18" height="8" fill="#1a1a1a" rx="3"/>

  <!-- Giant Hiking Backpack -->
  <rect x="220" y="140" width="90" height="110" fill="#F39C12" stroke="#1a1a1a" stroke-width="2.5" rx="8"/>
  <!-- Backpack straps -->
  <path d="M220 155 Q205 175 210 210" stroke="#1a1a1a" stroke-width="2.5" fill="none"/>
  <!-- Backpack pockets -->
  <rect x="228" y="200" width="74" height="38" fill="#E67E22" stroke="#1a1a1a" stroke-width="1.5" rx="4"/>
  <!-- Backpack top flap -->
  <rect x="220" y="136" width="90" height="22" fill="#E67E22" stroke="#1a1a1a" stroke-width="1.5" rx="5"/>

  <!-- Items sticking out of backpack - labels on tabs -->
  <!-- method tab -->
  <rect x="250" y="108" width="62" height="22" fill="#E74C3C" stroke="#1a1a1a" stroke-width="1.5" rx="3"/>
  <text x="281" y="124" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">method</text>
  <line x1="265" y1="130" x2="265" y2="136" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- path tab -->
  <rect x="294" y="102" width="52" height="22" fill="#27AE60" stroke="#1a1a1a" stroke-width="1.5" rx="3"/>
  <text x="320" y="118" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">path</text>
  <line x1="310" y1="124" x2="305" y2="136" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- params tab -->
  <rect x="228" y="92" width="60" height="22" fill="#8E44AD" stroke="#1a1a1a" stroke-width="1.5" rx="3"/>
  <text x="258" y="108" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">params</text>
  <line x1="248" y1="114" x2="244" y2="136" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- body tab - sticking out right side -->
  <rect x="312" y="152" width="52" height="22" fill="#4A90D9" stroke="#1a1a1a" stroke-width="1.5" rx="3"/>
  <text x="338" y="168" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">body</text>
  <line x1="312" y1="163" x2="310" y2="163" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- KV store tab -->
  <rect x="312" y="182" width="68" height="22" fill="#F39C12" stroke="#1a1a1a" stroke-width="1.5" rx="3"/>
  <text x="346" y="198" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">KV store</text>
  <line x1="312" y1="193" x2="310" y2="193" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- handlers[] tab -->
  <rect x="312" y="212" width="76" height="22" fill="#E74C3C" stroke="#1a1a1a" stroke-width="1.5" rx="3"/>
  <text x="350" y="228" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">handlers[]</text>
  <line x1="312" y1="223" x2="310" y2="223" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Speech bubble -->
  <rect x="415" y="110" width="330" height="70" fill="white" stroke="#1a1a1a" stroke-width="2" rx="10"/>
  <!-- Bubble tail -->
  <polygon points="415,145 395,155 418,160" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="416,145 396,155 419,160" fill="white"/>
  <text x="580" y="140" font-family="Arial, sans-serif" font-size="15" fill="#1a1a1a" text-anchor="middle">Everything I need</text>
  <text x="580" y="162" font-family="Arial, sans-serif" font-size="15" fill="#1a1a1a" text-anchor="middle">for one request.</text>

  <!-- Code box showing RequestContext fields -->
  <rect x="430" y="200" width="310" height="118" fill="#F0F0F0" stroke="#888888" stroke-width="1" rx="4"/>
  <text x="446" y="220" font-family="Courier New, monospace" font-size="13" fill="#1a1a1a">Structure RequestContext</text>
  <text x="462" y="238" font-family="Courier New, monospace" font-size="13" fill="#E74C3C">  *Request.HTTPRequest</text>
  <text x="462" y="255" font-family="Courier New, monospace" font-size="13" fill="#27AE60">  Params.StringMap</text>
  <text x="462" y="272" font-family="Courier New, monospace" font-size="13" fill="#4A90D9">  KV.StringMap</text>
  <text x="462" y="289" font-family="Courier New, monospace" font-size="13" fill="#8E44AD">  Handlers(64)</text>
  <text x="446" y="308" font-family="Courier New, monospace" font-size="13" fill="#1a1a1a">EndStructure</text>
</svg>
