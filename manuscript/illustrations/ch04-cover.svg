<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <!-- Background -->
  <rect width="800" height="380" fill="#FFFEF0" rx="8"/>
  <!-- Outer border -->
  <rect x="2" y="2" width="796" height="376" fill="none" stroke="#1a1a1a" stroke-width="4" rx="6"/>
  <!-- Top title banner -->
  <rect x="2" y="4" width="796" height="60" fill="#1a1a1a" rx="6"/>
  <rect x="2" y="40" width="796" height="24" fill="#1a1a1a"/>
  <text x="400" y="42" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="22" fill="#FFE000" text-anchor="middle" dominant-baseline="middle">Chapter 4: HTTP from First Principles</text>

  <!-- Single wide panel -->
  <rect x="4" y="64" width="792" height="264" fill="#FFFEF0"/>

  <!-- ===== Browser icon (left) ===== -->
  <!-- Browser frame -->
  <rect x="40" y="130" width="130" height="100" fill="white" stroke="#1a1a1a" stroke-width="2.5" rx="6"/>
  <!-- Browser toolbar -->
  <rect x="40" y="130" width="130" height="22" fill="#DDD" stroke="#1a1a1a" stroke-width="2" rx="6"/>
  <rect x="40" y="142" width="130" height="10" fill="#DDD"/>
  <!-- Browser buttons -->
  <circle cx="54" cy="141" r="4" fill="#E74C3C"/>
  <circle cx="66" cy="141" r="4" fill="#F39C12"/>
  <circle cx="78" cy="141" r="4" fill="#27AE60"/>
  <!-- URL bar -->
  <rect x="88" y="135" width="74" height="12" fill="white" stroke="#888" stroke-width="1" rx="2"/>
  <text x="125" y="144" font-family="Arial, sans-serif" font-size="8" fill="#555" text-anchor="middle">example.com/hello</text>
  <!-- Browser content -->
  <text x="105" y="185" font-family="Arial, sans-serif" font-size="11" fill="#555" text-anchor="middle">[ webpage ]</text>
  <!-- Browser label -->
  <text x="105" y="248" font-family="Arial, sans-serif" font-size="13" fill="#1a1a1a" text-anchor="middle" font-weight="bold">Browser</text>

  <!-- ===== GET Request packet (flying right with wings) ===== -->
  <!-- Packet body -->
  <rect x="208" y="150" width="156" height="46" fill="#4A90D9" stroke="#1a1a1a" stroke-width="2" rx="6"/>
  <!-- Packet text -->
  <text x="286" y="169" font-family="Courier New, monospace" font-size="12" fill="white" text-anchor="middle" font-weight="bold">GET /hello</text>
  <text x="286" y="187" font-family="Courier New, monospace" font-size="11" fill="#D0E8FF" text-anchor="middle">HTTP/1.1</text>
  <!-- Wings (left) -->
  <ellipse cx="205" cy="155" rx="18" ry="9" fill="#AED6F1" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(-30 205 155)"/>
  <ellipse cx="205" cy="190" rx="18" ry="9" fill="#AED6F1" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(30 205 190)"/>
  <!-- Wings (right) -->
  <ellipse cx="367" cy="155" rx="18" ry="9" fill="#AED6F1" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(30 367 155)"/>
  <ellipse cx="367" cy="190" rx="18" ry="9" fill="#AED6F1" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(-30 367 190)"/>
  <!-- Arrow direction indicator -->
  <polygon points="370,167 390,173 370,179" fill="#1a1a1a"/>

  <!-- ===== Arrow lines ===== -->
  <!-- Request arrow (top): browser → server -->
  <line x1="172" y1="168" x2="206" y2="168" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="366" y1="168" x2="434" y2="168" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Response arrow (bottom): server → browser -->
  <line x1="172" y1="222" x2="420" y2="222" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="172,215 154,222 172,229" fill="#1a1a1a"/>

  <!-- ===== Response packet (flying left with wings) ===== -->
  <!-- Packet body -->
  <rect x="432" y="198" width="156" height="46" fill="#27AE60" stroke="#1a1a1a" stroke-width="2" rx="6"/>
  <!-- Packet text -->
  <text x="510" y="217" font-family="Courier New, monospace" font-size="12" fill="white" text-anchor="middle" font-weight="bold">HTTP/1.1 200 OK</text>
  <text x="510" y="235" font-family="Courier New, monospace" font-size="11" fill="#AFFFCF" text-anchor="middle">Hello, World!</text>
  <!-- Wings (left) -->
  <ellipse cx="430" cy="203" rx="18" ry="9" fill="#A9DFBF" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(-30 430 203)"/>
  <ellipse cx="430" cy="238" rx="18" ry="9" fill="#A9DFBF" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(30 430 238)"/>
  <!-- Wings (right) -->
  <ellipse cx="590" cy="203" rx="18" ry="9" fill="#A9DFBF" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(30 590 203)"/>
  <ellipse cx="590" cy="238" rx="18" ry="9" fill="#A9DFBF" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(-30 590 238)"/>
  <!-- Arrow head pointing left -->
  <polygon points="432,218 412,222 432,226" fill="#1a1a1a"/>

  <!-- ===== Server tower (right) ===== -->
  <!-- Server rack -->
  <rect x="620" y="120" width="100" height="150" fill="#555" stroke="#1a1a1a" stroke-width="2.5" rx="6"/>
  <!-- Server units -->
  <rect x="628" y="130" width="84" height="22" fill="#666" stroke="#1a1a1a" stroke-width="1" rx="2"/>
  <circle cx="700" cy="141" r="4" fill="#27AE60"/>
  <rect x="628" y="158" width="84" height="22" fill="#666" stroke="#1a1a1a" stroke-width="1" rx="2"/>
  <circle cx="700" cy="169" r="4" fill="#27AE60"/>
  <rect x="628" y="186" width="84" height="22" fill="#666" stroke="#1a1a1a" stroke-width="1" rx="2"/>
  <circle cx="700" cy="197" r="4" fill="#FFE000"/>
  <rect x="628" y="214" width="84" height="22" fill="#666" stroke="#1a1a1a" stroke-width="1" rx="2"/>
  <circle cx="700" cy="225" r="4" fill="#27AE60"/>
  <!-- Ventilation slits -->
  <line x1="635" y1="244" x2="705" y2="244" stroke="#444" stroke-width="2"/>
  <line x1="635" y1="250" x2="705" y2="250" stroke="#444" stroke-width="2"/>
  <line x1="635" y1="256" x2="705" y2="256" stroke="#444" stroke-width="2"/>
  <!-- Server label -->
  <text x="670" y="290" font-family="Arial, sans-serif" font-size="13" fill="#1a1a1a" text-anchor="middle" font-weight="bold">Server</text>

  <!-- "process" label in center -->
  <rect x="360" y="175" width="80" height="34" fill="#F39C12" stroke="#1a1a1a" stroke-width="2" rx="16"/>
  <text x="400" y="197" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="bold">process</text>

  <!-- Bottom caption bar -->
  <rect x="2" y="330" width="796" height="46" fill="#1a1a1a" rx="6"/>
  <rect x="2" y="330" width="796" height="10" fill="#1a1a1a"/>
  <text x="400" y="358" font-family="Arial, sans-serif" font-size="15" fill="white" text-anchor="middle">Every web app is just request → process → response.</text>
</svg>
