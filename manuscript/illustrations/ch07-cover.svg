<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <!-- Background -->
  <rect width="800" height="380" fill="#FFFEF0" rx="8"/>
  <!-- Outer border -->
  <rect x="2" y="2" width="796" height="376" fill="none" stroke="#1a1a1a" stroke-width="4" rx="6"/>

  <!-- Top title banner -->
  <rect x="2" y="2" width="796" height="60" fill="#1a1a1a" rx="6"/>
  <rect x="2" y="50" width="796" height="14" fill="#1a1a1a"/>
  <text x="400" y="42" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="23" fill="#FFE000" text-anchor="middle">CHAPTER 7: MIDDLEWARE</text>

  <!-- Bottom caption bar -->
  <rect x="2" y="330" width="796" height="46" fill="#1a1a1a"/>
  <rect x="2" y="328" width="796" height="6" fill="#1a1a1a"/>
  <text x="400" y="358" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF" text-anchor="middle">Middleware: each handler in the chain does one job.</text>

  <!-- Conveyor belt base -->
  <rect x="40" y="220" width="720" height="18" fill="#888888" stroke="#1a1a1a" stroke-width="2" rx="4"/>
  <!-- Belt rollers -->
  <circle cx="70" cy="229" r="12" fill="#555555" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="140" cy="229" r="12" fill="#555555" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="210" cy="229" r="12" fill="#555555" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="310" cy="229" r="12" fill="#555555" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="410" cy="229" r="12" fill="#555555" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="510" cy="229" r="12" fill="#555555" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="610" cy="229" r="12" fill="#555555" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="700" cy="229" r="12" fill="#555555" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="750" cy="229" r="12" fill="#555555" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Belt surface -->
  <rect x="40" y="220" width="720" height="18" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Request box entering (left) -->
  <rect x="48" y="185" width="70" height="36" fill="#4A90D9" stroke="#1a1a1a" stroke-width="2" rx="4"/>
  <text x="83" y="199" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">REQUEST</text>
  <text x="83" y="213" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">GET /users</text>
  <!-- Arrow on belt going right -->
  <polygon points="125,200 140,207 125,214" fill="#1a1a1a"/>

  <!-- Worker 1: Logger (writes in notebook) -->
  <!-- Worker platform -->
  <rect x="210" y="155" width="100" height="65" fill="#FFFEF0" stroke="#1a1a1a" stroke-width="1" rx="3" stroke-dasharray="4,2"/>
  <!-- Head -->
  <circle cx="260" cy="130" r="18" fill="#F5CBA7" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Eyes -->
  <circle cx="254" cy="126" r="2.5" fill="#1a1a1a"/>
  <circle cx="266" cy="126" r="2.5" fill="#1a1a1a"/>
  <!-- Body -->
  <rect x="248" y="148" width="24" height="38" fill="#27AE60" stroke="#1a1a1a" stroke-width="2" rx="3"/>
  <!-- Right arm holding notebook -->
  <line x1="272" y1="158" x2="292" y2="168" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Notebook -->
  <rect x="290" y="162" width="28" height="22" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <line x1="295" y1="168" x2="313" y2="168" stroke="#888" stroke-width="1"/>
  <line x1="295" y1="174" x2="313" y2="174" stroke="#888" stroke-width="1"/>
  <!-- Pencil -->
  <line x1="316" y1="161" x2="322" y2="155" stroke="#F39C12" stroke-width="2"/>
  <!-- Left arm -->
  <line x1="248" y1="158" x2="232" y2="170" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Legs -->
  <line x1="256" y1="186" x2="250" y2="218" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="268" y1="186" x2="274" y2="218" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Logger label -->
  <rect x="230" y="98" width="60" height="22" fill="#27AE60" stroke="#1a1a1a" stroke-width="1.5" rx="3"/>
  <text x="260" y="114" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Logger</text>

  <!-- Worker 2: Recovery (wears hard hat) -->
  <rect x="360" y="155" width="100" height="65" fill="#FFFEF0" stroke="#1a1a1a" stroke-width="1" rx="3" stroke-dasharray="4,2"/>
  <!-- Head -->
  <circle cx="410" cy="130" r="18" fill="#F5CBA7" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Hard hat -->
  <ellipse cx="410" cy="115" rx="22" ry="8" fill="#FFE000" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="394" y="113" width="32" height="10" fill="#FFE000" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <!-- Eyes -->
  <circle cx="404" cy="128" r="2.5" fill="#1a1a1a"/>
  <circle cx="416" cy="128" r="2.5" fill="#1a1a1a"/>
  <!-- Body -->
  <rect x="398" y="148" width="24" height="38" fill="#E74C3C" stroke="#1a1a1a" stroke-width="2" rx="3"/>
  <!-- Arms -->
  <line x1="422" y1="158" x2="440" y2="172" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="398" y1="158" x2="380" y2="172" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Legs -->
  <line x1="406" y1="186" x2="400" y2="218" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="418" y1="186" x2="424" y2="218" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Recovery label -->
  <rect x="374" y="98" width="72" height="22" fill="#E74C3C" stroke="#1a1a1a" stroke-width="1.5" rx="3"/>
  <text x="410" y="114" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Recovery</text>

  <!-- Worker 3: Auth (holds badge scanner) -->
  <rect x="510" y="155" width="100" height="65" fill="#FFFEF0" stroke="#1a1a1a" stroke-width="1" rx="3" stroke-dasharray="4,2"/>
  <!-- Head -->
  <circle cx="560" cy="130" r="18" fill="#F5CBA7" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Eyes -->
  <circle cx="554" cy="126" r="2.5" fill="#1a1a1a"/>
  <circle cx="566" cy="126" r="2.5" fill="#1a1a1a"/>
  <!-- Body -->
  <rect x="548" y="148" width="24" height="38" fill="#8E44AD" stroke="#1a1a1a" stroke-width="2" rx="3"/>
  <!-- Right arm holding badge scanner -->
  <line x1="572" y1="158" x2="592" y2="166" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Badge scanner device -->
  <rect x="588" y="158" width="32" height="24" fill="#333333" stroke="#1a1a1a" stroke-width="1.5" rx="3"/>
  <rect x="592" y="162" width="24" height="12" fill="#4A90D9" rx="2"/>
  <!-- Badge being scanned -->
  <rect x="576" y="170" width="18" height="24" fill="#FFE000" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="585" y="183" font-family="Arial, sans-serif" font-size="7" fill="#1a1a1a" text-anchor="middle">AUTH</text>
  <!-- Left arm -->
  <line x1="548" y1="158" x2="532" y2="170" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Legs -->
  <line x1="556" y1="186" x2="550" y2="218" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="568" y1="186" x2="574" y2="218" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Auth label -->
  <rect x="535" y="98" width="50" height="22" fill="#8E44AD" stroke="#1a1a1a" stroke-width="1.5" rx="3"/>
  <text x="560" y="114" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Auth</text>

  <!-- Transformed request box exiting (right) -->
  <rect x="682" y="182" width="78" height="40" fill="#27AE60" stroke="#1a1a1a" stroke-width="2" rx="4"/>
  <text x="721" y="197" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">PROCESSED</text>
  <text x="721" y="210" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">RESPONSE</text>
  <!-- Sparkles on transformed request -->
  <text x="660" y="192" font-family="Arial, sans-serif" font-size="16" fill="#FFE000">*</text>
  <text x="663" y="205" font-family="Arial, sans-serif" font-size="12" fill="#FFE000">*</text>

  <!-- Arrow between belt end and exit box -->
  <polygon points="672,204 682,200 672,196" fill="#1a1a1a"/>
</svg>
