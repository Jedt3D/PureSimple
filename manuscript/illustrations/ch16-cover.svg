<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <!-- Background -->
  <rect width="800" height="380" fill="#FFFEF0" rx="8"/>
  <!-- Outer border -->
  <rect x="2" y="2" width="796" height="376" fill="none" stroke="#1a1a1a" stroke-width="4" rx="6"/>
  <!-- Top title banner -->
  <rect x="2" y="4" width="796" height="60" fill="#1a1a1a" rx="6"/>
  <rect x="2" y="40" width="796" height="24" fill="#1a1a1a"/>
  <text x="400" y="42" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="22" fill="#FFE000" text-anchor="middle" dominant-baseline="middle">Chapter 16: Authentication</text>

  <!-- ===== SINGLE WIDE PANEL ===== -->

  <!-- Door frame -->
  <rect x="350" y="90" width="110" height="220" fill="#F39C12" stroke="#1a1a1a" stroke-width="3" rx="4"/>
  <!-- Door -->
  <rect x="358" y="98" width="94" height="204" fill="#8E44AD" stroke="#1a1a1a" stroke-width="2" rx="3"/>
  <!-- Door knob -->
  <circle cx="390" cy="205" r="6" fill="#FFE000" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- "200 OK" sign on door interior (slightly visible) -->
  <rect x="372" y="140" width="66" height="28" fill="#27AE60" stroke="#1a1a1a" stroke-width="1.5" rx="4"/>
  <text x="405" y="158" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="bold">200 OK</text>

  <!-- ===== GUARD CHARACTER (right of door) ===== -->
  <!-- Body -->
  <rect x="484" y="195" width="24" height="44" fill="#4A90D9" stroke="#1a1a1a" stroke-width="2" rx="4"/>
  <!-- Head -->
  <circle cx="496" cy="182" r="18" fill="#F39C12" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Guard hat -->
  <rect x="480" y="162" width="32" height="10" fill="#1a1a1a" rx="2"/>
  <rect x="484" y="154" width="24" height="10" fill="#1a1a1a" rx="2"/>
  <!-- Eyes (stern) -->
  <line x1="489" y1="182" x2="493" y2="182" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="499" y1="182" x2="503" y2="182" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Mouth (firm line) -->
  <line x1="490" y1="190" x2="502" y2="190" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Arm holding sign -->
  <line x1="484" y1="205" x2="462" y2="220" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Other arm raised to check creds -->
  <line x1="508" y1="205" x2="524" y2="215" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Legs -->
  <line x1="488" y1="239" x2="484" y2="268" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="502" y1="239" x2="506" y2="268" stroke="#1a1a1a" stroke-width="2"/>

  <!-- 401 sign held by guard -->
  <rect x="520" y="210" width="110" height="36" fill="#E74C3C" stroke="#1a1a1a" stroke-width="2" rx="4"/>
  <text x="575" y="233" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">401 Unauthorized</text>

  <!-- ===== USER CHARACTER (approaching from left) ===== -->
  <!-- Body -->
  <rect x="186" y="200" width="22" height="40" fill="#27AE60" stroke="#1a1a1a" stroke-width="2" rx="4"/>
  <!-- Head -->
  <circle cx="197" cy="188" r="18" fill="#F39C12" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Eyes (hopeful) -->
  <circle cx="191" cy="186" r="3" fill="#1a1a1a"/>
  <circle cx="203" cy="186" r="3" fill="#1a1a1a"/>
  <!-- Smile -->
  <path d="M191 194 Q197 200 203 194" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <!-- Arm stretched forward holding envelope -->
  <line x1="208" y1="210" x2="240" y2="218" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Other arm -->
  <line x1="186" y1="210" x2="170" y2="225" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Legs walking -->
  <line x1="190" y1="240" x2="182" y2="268" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="204" y1="240" x2="212" y2="268" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Envelope with credentials -->
  <rect x="238" y="210" width="90" height="56" fill="white" stroke="#1a1a1a" stroke-width="2" rx="3"/>
  <!-- Envelope flap -->
  <polygon points="238,210 283,240 328,210" fill="#FFFEF0" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Credentials text on envelope -->
  <text x="283" y="252" font-family="Arial, sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle">Authorization: Basic</text>
  <text x="283" y="264" font-family="Arial, sans-serif" font-size="9" fill="#4A90D9" text-anchor="middle">dXNlcjpwYXNz</text>

  <!-- Arrow from user to guard (approaching path) -->
  <line x1="330" y1="235" x2="345" y2="235" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="345,231 353,235 345,239" fill="#1a1a1a"/>

  <!-- Nod/checkmark near guard (guard checking) -->
  <circle cx="540" cy="165" r="16" fill="#27AE60" stroke="#1a1a1a" stroke-width="2"/>
  <polyline points="532,165 538,172 550,158" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Speech bubble from guard -->
  <rect x="555" y="130" width="130" height="38" fill="white" stroke="#1a1a1a" stroke-width="2" rx="8"/>
  <polygon points="580,168 574,180 590,168" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="581,169 575,179 589,169" fill="white"/>
  <text x="620" y="147" font-family="Arial, sans-serif" font-size="13" fill="#1a1a1a" text-anchor="middle" font-weight="bold">Credentials</text>
  <text x="620" y="162" font-family="Arial, sans-serif" font-size="13" fill="#27AE60" text-anchor="middle" font-weight="bold">verified. Enter!</text>

  <!-- Door open indicator (light coming through) -->
  <rect x="358" y="98" width="30" height="204" fill="#FFE000" opacity="0.3"/>

  <!-- Bottom caption bar -->
  <rect x="2" y="330" width="796" height="46" fill="#1a1a1a" rx="6"/>
  <rect x="2" y="330" width="796" height="10" fill="#1a1a1a"/>
  <text x="400" y="358" font-family="Arial, sans-serif" font-size="15" fill="white" text-anchor="middle">BasicAuth: decode, verify, admit — or reject with 401.</text>
</svg>
