<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <!-- Background -->
  <rect width="800" height="380" fill="#FFFEF0" rx="8"/>
  <!-- Outer border -->
  <rect x="2" y="2" width="796" height="376" fill="none" stroke="#1a1a1a" stroke-width="4" rx="6"/>
  <!-- Top title banner -->
  <rect x="2" y="4" width="796" height="60" fill="#1a1a1a" rx="6"/>
  <rect x="2" y="40" width="796" height="24" fill="#1a1a1a"/>
  <text x="400" y="42" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="22" fill="#FFE000" text-anchor="middle" dominant-baseline="middle">Chapter 2: PureBasic Language Essentials</text>

  <!-- Single wide panel -->
  <rect x="4" y="64" width="792" height="264" fill="#FFFEF0"/>

  <!-- Chalkboard -->
  <rect x="60" y="85" width="360" height="220" fill="#2C5F2E" stroke="#1a1a1a" stroke-width="3" rx="4"/>
  <!-- Chalkboard frame -->
  <rect x="68" y="93" width="344" height="204" fill="#2C5F2E" stroke="#8B6914" stroke-width="6" rx="2"/>
  <!-- Chalk tray -->
  <rect x="60" y="303" width="360" height="10" fill="#8B6914" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Code written on chalkboard -->
  <text x="240" y="135" font-family="Courier New, monospace" font-size="18" fill="#F5F5DC" text-anchor="middle" font-weight="bold">EnableExplicit</text>
  <line x1="100" y1="148" x2="380" y2="148" stroke="#F5F5DC" stroke-width="1" opacity="0.4"/>
  <text x="240" y="176" font-family="Courier New, monospace" font-size="17" fill="#7DFFB3" text-anchor="middle">Protected x.i</text>
  <line x1="100" y1="188" x2="380" y2="188" stroke="#F5F5DC" stroke-width="1" opacity="0.4"/>
  <text x="240" y="216" font-family="Courier New, monospace" font-size="17" fill="#7DFFB3" text-anchor="middle">If result = 0</text>
  <line x1="100" y1="228" x2="380" y2="228" stroke="#F5F5DC" stroke-width="1" opacity="0.4"/>
  <!-- Chalk marks / annotations -->
  <text x="110" y="259" font-family="Arial, sans-serif" font-size="13" fill="#FFE000" text-anchor="start">← required at top of every file</text>
  <text x="110" y="280" font-family="Arial, sans-serif" font-size="13" fill="#FFD700" text-anchor="start">← declare before use</text>

  <!-- Developer character at chalkboard -->
  <!-- Body -->
  <rect x="38" y="195" width="20" height="40" fill="#4A90D9" stroke="#1a1a1a" stroke-width="2" rx="3"/>
  <!-- Head -->
  <circle cx="48" cy="184" r="16" fill="#F39C12" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Eyes -->
  <circle cx="43" cy="182" r="3" fill="#1a1a1a"/>
  <circle cx="53" cy="182" r="3" fill="#1a1a1a"/>
  <!-- Focused expression -->
  <path d="M43 190 Q48 193 53 190" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <!-- Arm holding chalk -->
  <line x1="58" y1="204" x2="70" y2="215" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Chalk piece -->
  <rect x="68" y="213" width="12" height="5" fill="white" stroke="#1a1a1a" stroke-width="1" rx="1"/>
  <!-- Other arm -->
  <line x1="38" y1="204" x2="24" y2="218" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Legs -->
  <line x1="42" y1="235" x2="38" y2="260" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="56" y1="235" x2="60" y2="260" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Compiler Robot character (right side) -->
  <!-- Robot body -->
  <rect x="530" y="185" width="50" height="55" fill="#888" stroke="#1a1a1a" stroke-width="2" rx="5"/>
  <!-- Robot head -->
  <rect x="534" y="155" width="42" height="32" fill="#AAA" stroke="#1a1a1a" stroke-width="2" rx="4"/>
  <!-- Antenna -->
  <line x1="555" y1="155" x2="555" y2="138" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="555" cy="134" r="5" fill="#E74C3C" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Robot eyes -->
  <rect x="539" y="162" width="10" height="8" fill="#4A90D9" stroke="#1a1a1a" stroke-width="1" rx="1"/>
  <rect x="561" y="162" width="10" height="8" fill="#4A90D9" stroke="#1a1a1a" stroke-width="1" rx="1"/>
  <!-- Robot mouth (grid) -->
  <rect x="541" y="177" width="28" height="6" fill="#666" stroke="#1a1a1a" stroke-width="1" rx="1"/>
  <line x1="548" y1="177" x2="548" y2="183" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="555" y1="177" x2="555" y2="183" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="562" y1="177" x2="562" y2="183" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Robot arm pointing -->
  <line x1="530" y1="198" x2="500" y2="215" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="580" y1="198" x2="600" y2="215" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Robot legs -->
  <rect x="535" y="240" width="14" height="22" fill="#888" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <rect x="561" y="240" width="14" height="22" fill="#888" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>

  <!-- Bug icon (red X) being caught -->
  <circle cx="490" cy="218" r="14" fill="#E74C3C" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="482" y1="210" x2="498" y2="226" stroke="white" stroke-width="3"/>
  <line x1="498" y1="210" x2="482" y2="226" stroke="white" stroke-width="3"/>
  <!-- Bug label -->
  <text x="490" y="242" font-family="Arial, sans-serif" font-size="11" fill="#E74C3C" text-anchor="middle" font-weight="bold">undeclared</text>

  <!-- Speech bubble from robot -->
  <rect x="600" y="120" width="175" height="48" fill="white" stroke="#1a1a1a" stroke-width="2" rx="8"/>
  <polygon points="610,168 604,182 622,168" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="611,169 605,181 621,169" fill="white"/>
  <text x="688" y="141" font-family="Arial, sans-serif" font-size="13" fill="#E74C3C" text-anchor="middle" font-weight="bold">Variable not</text>
  <text x="688" y="159" font-family="Arial, sans-serif" font-size="13" fill="#E74C3C" text-anchor="middle" font-weight="bold">declared!</text>

  <!-- Bottom caption bar -->
  <rect x="2" y="330" width="796" height="46" fill="#1a1a1a" rx="6"/>
  <rect x="2" y="330" width="796" height="10" fill="#1a1a1a"/>
  <text x="400" y="358" font-family="Arial, sans-serif" font-size="15" fill="white" text-anchor="middle">The compiler is your first line of defence.</text>
</svg>
