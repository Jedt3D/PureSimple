<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <!-- Background -->
  <rect width="800" height="380" fill="#FFFEF0" rx="8"/>
  <!-- Outer border -->
  <rect x="2" y="2" width="796" height="376" fill="none" stroke="#1a1a1a" stroke-width="4" rx="6"/>
  <!-- Top title banner -->
  <rect x="2" y="4" width="796" height="60" fill="#1a1a1a" rx="6"/>
  <rect x="2" y="40" width="796" height="24" fill="#1a1a1a"/>
  <text x="400" y="42" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="22" fill="#FFE000" text-anchor="middle" dominant-baseline="middle">Chapter 17: CSRF Protection</text>

  <!-- Panel divider -->
  <line x1="400" y1="64" x2="400" y2="330" stroke="#1a1a1a" stroke-width="3"/>

  <!-- ===== LEFT PANEL: Evil site attack blocked ===== -->
  <rect x="4" y="64" width="394" height="264" fill="#FFFEF0"/>

  <!-- Evil site flag (top left) -->
  <line x1="60" y1="80" x2="60" y2="170" stroke="#1a1a1a" stroke-width="3"/>
  <rect x="60" y="80" width="70" height="44" fill="#E74C3C" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Skull on flag -->
  <circle cx="90" cy="96" r="10" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="82" y="104" width="16" height="8" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="86" cy="96" r="2.5" fill="#1a1a1a"/>
  <circle cx="94" cy="96" r="2.5" fill="#1a1a1a"/>
  <line x1="85" y1="107" x2="85" y2="112" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="90" y1="107" x2="90" y2="112" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="95" y1="107" x2="95" y2="112" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="95" y="135" font-family="Arial, sans-serif" font-size="9" fill="#E74C3C" text-anchor="middle" font-weight="bold">evil.com</text>

  <!-- Skull character (attacker) -->
  <!-- Body -->
  <rect x="56" y="200" width="22" height="40" fill="#E74C3C" stroke="#1a1a1a" stroke-width="2" rx="4"/>
  <!-- Head (skull-like) -->
  <circle cx="67" cy="188" r="18" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Skull eyes (X marks) -->
  <line x1="60" y1="184" x2="66" y2="190" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="66" y1="184" x2="60" y2="190" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="70" y1="184" x2="76" y2="190" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="76" y1="184" x2="70" y2="190" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Evil grin (teeth) -->
  <rect x="60" y="194" width="14" height="6" fill="#1a1a1a" rx="1"/>
  <line x1="64" y1="194" x2="64" y2="200" stroke="white" stroke-width="1"/>
  <line x1="68" y1="194" x2="68" y2="200" stroke="white" stroke-width="1"/>
  <!-- Arms -->
  <line x1="56" y1="208" x2="38" y2="220" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="78" y1="208" x2="100" y2="215" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Legs -->
  <line x1="60" y1="240" x2="56" y2="268" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="74" y1="240" x2="78" y2="268" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Forged form held by attacker -->
  <rect x="100" y="198" width="80" height="52" fill="white" stroke="#E74C3C" stroke-width="2" rx="4"/>
  <text x="140" y="216" font-family="Arial, sans-serif" font-size="10" fill="#E74C3C" text-anchor="middle" font-weight="bold">FORGED FORM</text>
  <text x="140" y="230" font-family="Arial, sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle">action=/transfer</text>
  <text x="140" y="242" font-family="Arial, sans-serif" font-size="9" fill="#E74C3C" text-anchor="middle">no token!</text>

  <!-- Arrow from attacker toward right (blocked) -->
  <line x1="182" y1="228" x2="248" y2="228" stroke="#E74C3C" stroke-width="3" stroke-dasharray="6,3"/>
  <polygon points="248,222 260,228 248,234" fill="#E74C3C"/>

  <!-- CSRF Middleware shield -->
  <!-- Shield body -->
  <polygon points="280,170 340,170 340,250 310,275 280,250" fill="#4A90D9" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Shield inner border -->
  <polygon points="287,178 333,178 333,248 310,268 287,248" fill="#4A90D9" stroke="white" stroke-width="1.5"/>
  <!-- Shield label -->
  <text x="310" y="210" font-family="Arial Black, Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="900">CSRF</text>
  <text x="310" y="226" font-family="Arial Black, Arial, sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="900">Middleware</text>

  <!-- Red X blocking the arrow -->
  <circle cx="270" cy="228" r="16" fill="#E74C3C" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="261" y1="219" x2="279" y2="237" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="279" y1="219" x2="261" y2="237" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Left panel label -->
  <text x="200" y="295" font-family="Arial, sans-serif" font-size="12" fill="#E74C3C" text-anchor="middle" font-weight="bold">Attack blocked!</text>

  <!-- ===== RIGHT PANEL: Legitimate user with token ===== -->
  <rect x="402" y="64" width="394" height="264" fill="#FFFEF0"/>

  <!-- Legitimate user character -->
  <!-- Body -->
  <rect x="445" y="200" width="22" height="40" fill="#27AE60" stroke="#1a1a1a" stroke-width="2" rx="4"/>
  <!-- Head -->
  <circle cx="456" cy="188" r="18" fill="#F39C12" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Happy eyes -->
  <path d="M449 186 Q451 183 453 186" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <path d="M458 186 Q460 183 462 186" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <!-- Smile -->
  <path d="M449 194 Q456 201 463 194" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <!-- Arms -->
  <line x1="445" y1="210" x2="428" y2="222" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="467" y1="210" x2="490" y2="218" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Legs -->
  <line x1="449" y1="240" x2="445" y2="268" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="463" y1="240" x2="467" y2="268" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Legitimate form with token -->
  <rect x="492" y="188" width="100" height="66" fill="white" stroke="#27AE60" stroke-width="2" rx="4"/>
  <text x="542" y="207" font-family="Arial, sans-serif" font-size="10" fill="#1a1a1a" text-anchor="middle" font-weight="bold">REAL FORM</text>
  <text x="542" y="222" font-family="Arial, sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle">action=/transfer</text>
  <!-- Token field -->
  <rect x="500" y="228" width="84" height="16" fill="#FFFEF0" stroke="#27AE60" stroke-width="1" rx="2"/>
  <text x="542" y="240" font-family="Arial, sans-serif" font-size="8" fill="#27AE60" text-anchor="middle">token: a3f9k2m...</text>

  <!-- Arrow from form to server -->
  <line x1="594" y1="222" x2="640" y2="222" stroke="#27AE60" stroke-width="3"/>
  <polygon points="640,217 652,222 640,227" fill="#27AE60"/>

  <!-- Server box -->
  <rect x="654" y="190" width="90" height="60" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="2" rx="4"/>
  <text x="699" y="216" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Server</text>
  <!-- Server lights -->
  <circle cx="670" cy="230" r="4" fill="#27AE60"/>
  <circle cx="682" cy="230" r="4" fill="#27AE60"/>
  <circle cx="694" cy="230" r="4" fill="#FFE000"/>

  <!-- Big green checkmark -->
  <circle cx="625" cy="155" r="22" fill="#27AE60" stroke="#1a1a1a" stroke-width="2"/>
  <polyline points="614,155 622,164 638,145" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right panel label -->
  <text x="596" y="295" font-family="Arial, sans-serif" font-size="12" fill="#27AE60" text-anchor="middle" font-weight="bold">Token verified!</text>

  <!-- Bottom caption bar -->
  <rect x="2" y="330" width="796" height="46" fill="#1a1a1a" rx="6"/>
  <rect x="2" y="330" width="796" height="10" fill="#1a1a1a"/>
  <text x="400" y="358" font-family="Arial, sans-serif" font-size="15" fill="white" text-anchor="middle">CSRF tokens: only your forms get through.</text>
</svg>
