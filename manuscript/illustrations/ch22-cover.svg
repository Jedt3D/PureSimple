<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <!-- Background -->
  <rect width="800" height="380" fill="#FFFEF0" rx="8"/>
  <!-- Outer border -->
  <rect x="2" y="2" width="796" height="376" fill="none" stroke="#1a1a1a" stroke-width="4" rx="6"/>
  <!-- Top title banner -->
  <rect x="2" y="4" width="796" height="60" fill="#1a1a1a" rx="6"/>
  <rect x="2" y="40" width="796" height="24" fill="#1a1a1a"/>
  <text x="400" y="42" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="22" fill="#FFE000" text-anchor="middle" dominant-baseline="middle">Chapter 22: Building a Blog</text>

  <!-- Panel divider -->
  <line x1="400" y1="64" x2="400" y2="330" stroke="#1a1a1a" stroke-width="3"/>

  <!-- ===== LEFT PANEL: DB → Template → HTML ===== -->
  <rect x="4" y="64" width="394" height="264" fill="#FFFEF0"/>

  <!-- DB Cylinder -->
  <ellipse cx="100" cy="115" rx="42" ry="14" fill="#4A90D9" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="58" y="115" width="84" height="54" fill="#4A90D9" stroke="#1a1a1a" stroke-width="2"/>
  <ellipse cx="100" cy="169" rx="42" ry="14" fill="#3A80C9" stroke="#1a1a1a" stroke-width="2"/>
  <!-- DB label -->
  <text x="100" y="143" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="bold">SQLite</text>
  <!-- DB rows hint -->
  <line x1="66" y1="133" x2="134" y2="133" stroke="white" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="66" y1="148" x2="134" y2="148" stroke="white" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- Arrow DB → Template -->
  <line x1="100" y1="183" x2="100" y2="210" stroke="#1a1a1a" stroke-width="2.5"/>
  <polygon points="95,210 100,222 105,210" fill="#1a1a1a"/>
  <text x="130" y="200" font-family="Arial, sans-serif" font-size="11" fill="#8E44AD">query</text>

  <!-- Jinja Template file icon -->
  <rect x="58" y="224" width="84" height="64" fill="#F39C12" stroke="#1a1a1a" stroke-width="2" rx="3"/>
  <!-- Dog-ear fold -->
  <polygon points="122,224 142,244 142,244 122,244" fill="#c67f0e" stroke="#1a1a1a" stroke-width="1"/>
  <polygon points="122,224 142,244 122,244" fill="#FFFEF0"/>
  <text x="100" y="248" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">post.html</text>
  <text x="100" y="264" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">{# jinja #}</text>
  <text x="100" y="278" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">{{ post.title }}</text>

  <!-- Arrow Template → HTML -->
  <line x1="145" y1="256" x2="195" y2="256" stroke="#1a1a1a" stroke-width="2.5"/>
  <polygon points="195,251 207,256 195,261" fill="#1a1a1a"/>
  <text x="170" y="248" font-family="Arial, sans-serif" font-size="11" fill="#27AE60">render</text>

  <!-- HTML Page output -->
  <rect x="208" y="220" width="100" height="76" fill="white" stroke="#1a1a1a" stroke-width="2" rx="3"/>
  <!-- HTML page browser-bar hint -->
  <rect x="208" y="220" width="100" height="16" fill="#E74C3C" rx="3"/>
  <rect x="208" y="228" width="100" height="8" fill="#E74C3C"/>
  <text x="258" y="233" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">HTML</text>
  <!-- Page content lines -->
  <rect x="216" y="244" width="84" height="6" fill="#1a1a1a" rx="1"/>
  <rect x="216" y="256" width="60" height="4" fill="#888" rx="1"/>
  <rect x="216" y="264" width="74" height="4" fill="#888" rx="1"/>
  <rect x="216" y="272" width="50" height="4" fill="#888" rx="1"/>
  <rect x="216" y="282" width="68" height="4" fill="#888" rx="1"/>

  <!-- Admin character (glasses) -->
  <!-- Body -->
  <rect x="290" y="195" width="20" height="38" fill="#8E44AD" stroke="#1a1a1a" stroke-width="2" rx="4"/>
  <!-- Head -->
  <circle cx="300" cy="184" r="16" fill="#F39C12" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Glasses -->
  <rect x="289" y="179" width="9" height="7" fill="none" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <rect x="302" y="179" width="9" height="7" fill="none" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <line x1="298" y1="182" x2="302" y2="182" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="289" y1="182" x2="285" y2="182" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="311" y1="182" x2="315" y2="182" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Smile -->
  <path d="M294 191 Q300 197 306 191" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <!-- Arms -->
  <line x1="290" y1="202" x2="274" y2="215" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="310" y1="202" x2="326" y2="215" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Legs -->
  <line x1="293" y1="233" x2="289" y2="260" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="307" y1="233" x2="311" y2="260" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Speech bubble: admin -->
  <rect x="240" y="130" width="130" height="36" fill="white" stroke="#1a1a1a" stroke-width="2" rx="8"/>
  <polygon points="298,166 292,178 308,166" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="299,167 293,177 307,167" fill="white"/>
  <text x="305" y="151" font-family="Arial, sans-serif" font-size="13" fill="#1a1a1a" text-anchor="middle" font-weight="bold">Publish post!</text>

  <!-- ===== RIGHT PANEL: Blog in browser ===== -->
  <rect x="402" y="64" width="394" height="264" fill="#FFFEF0"/>

  <!-- Browser window -->
  <rect x="420" y="76" width="360" height="240" fill="white" stroke="#1a1a1a" stroke-width="2" rx="6"/>
  <!-- Browser chrome -->
  <rect x="420" y="76" width="360" height="28" fill="#E0E0E0" rx="6"/>
  <rect x="420" y="90" width="360" height="14" fill="#E0E0E0"/>
  <!-- Browser dots -->
  <circle cx="436" cy="90" r="5" fill="#E74C3C"/>
  <circle cx="452" cy="90" r="5" fill="#F39C12"/>
  <circle cx="468" cy="90" r="5" fill="#27AE60"/>
  <!-- URL bar -->
  <rect x="484" y="82" width="220" height="16" fill="white" stroke="#aaa" stroke-width="1" rx="3"/>
  <text x="594" y="93" font-family="Arial, monospace, sans-serif" font-size="10" fill="#555" text-anchor="middle">localhost:8080/blog/1</text>

  <!-- Blog post content -->
  <!-- Post title -->
  <text x="440" y="128" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="16" fill="#1a1a1a">Wild &amp; Still</text>
  <!-- Image placeholder -->
  <rect x="440" y="138" width="340" height="60" fill="#D0E8F8" stroke="#aaa" stroke-width="1" rx="2"/>
  <text x="610" y="172" font-family="Arial, sans-serif" font-size="12" fill="#888" text-anchor="middle">[hero image]</text>
  <!-- Paragraph lines -->
  <rect x="440" y="208" width="320" height="6" fill="#555" rx="1"/>
  <rect x="440" y="220" width="300" height="6" fill="#888" rx="1"/>
  <rect x="440" y="232" width="340" height="6" fill="#888" rx="1"/>
  <rect x="440" y="244" width="260" height="6" fill="#888" rx="1"/>
  <!-- Tags -->
  <rect x="440" y="260" width="50" height="16" fill="#4A90D9" rx="8"/>
  <text x="465" y="272" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">PureBasic</text>
  <rect x="498" y="260" width="42" height="16" fill="#27AE60" rx="8"/>
  <text x="519" y="272" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Web</text>
  <rect x="548" y="260" width="50" height="16" fill="#8E44AD" rx="8"/>
  <text x="573" y="272" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Tutorial</text>

  <!-- Bottom caption bar -->
  <rect x="2" y="330" width="796" height="46" fill="#1a1a1a" rx="6"/>
  <rect x="2" y="330" width="796" height="10" fill="#1a1a1a"/>
  <text x="400" y="358" font-family="Arial, sans-serif" font-size="15" fill="white" text-anchor="middle">From database row to rendered blog post in one request.</text>
</svg>
