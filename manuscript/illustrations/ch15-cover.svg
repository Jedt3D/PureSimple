<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <!-- Background -->
  <rect width="800" height="380" fill="#FFFEF0" rx="8"/>
  <!-- Outer border -->
  <rect x="2" y="2" width="796" height="376" fill="none" stroke="#1a1a1a" stroke-width="4" rx="6"/>

  <!-- Top title banner -->
  <rect x="2" y="4" width="796" height="60" fill="#1a1a1a" rx="6"/>
  <rect x="2" y="46" width="796" height="18" fill="#1a1a1a"/>
  <text x="400" y="42" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="22" fill="#FFE000" text-anchor="middle">Chapter 15: Sessions and Cookies</text>

  <!-- Panel divider -->
  <line x1="400" y1="68" x2="400" y2="330" stroke="#1a1a1a" stroke-width="3"/>

  <!-- === LEFT PANEL: Hotel front desk — clerk gives key card === -->
  <text x="200" y="90" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="13" fill="#1a1a1a" text-anchor="middle">First Request — Login</text>

  <!-- Hotel desk / counter -->
  <rect x="30" y="228" width="340" height="20" fill="#8B6914" stroke="#1a1a1a" stroke-width="2" rx="3"/>
  <rect x="30" y="238" width="340" height="50" fill="#A0782A" stroke="#1a1a1a" stroke-width="2" rx="2"/>
  <!-- Front panel of desk -->
  <line x1="50" y1="248" x2="50" y2="285" stroke="#7A5A10" stroke-width="1.5"/>
  <line x1="100" y1="248" x2="100" y2="285" stroke="#7A5A10" stroke-width="1.5"/>
  <line x1="160" y1="248" x2="160" y2="285" stroke="#7A5A10" stroke-width="1.5"/>
  <line x1="220" y1="248" x2="220" y2="285" stroke="#7A5A10" stroke-width="1.5"/>
  <line x1="280" y1="248" x2="280" y2="285" stroke="#7A5A10" stroke-width="1.5"/>
  <line x1="340" y1="248" x2="340" y2="285" stroke="#7A5A10" stroke-width="1.5"/>

  <!-- "HOTEL SERVER" sign above desk -->
  <rect x="130" y="95" width="115" height="22" fill="#4A90D9" rx="3"/>
  <text x="187" y="111" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="11" fill="white" text-anchor="middle">HOTEL SERVER</text>

  <!-- CLERK (server) character - left side of desk -->
  <!-- Clerk body -->
  <rect x="170" y="176" width="22" height="54" fill="#27AE60" stroke="#1a1a1a" stroke-width="2" rx="4"/>
  <!-- Clerk head -->
  <circle cx="181" cy="163" r="16" fill="#FFDAB9" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Clerk eyes -->
  <circle cx="175" cy="161" r="2" fill="#1a1a1a"/>
  <circle cx="187" cy="161" r="2" fill="#1a1a1a"/>
  <!-- Clerk smile -->
  <path d="M176 168 Q181 173 186 168" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Clerk bow tie -->
  <polygon points="176,178 181,182 186,178 181,174" fill="#E74C3C"/>
  <!-- Clerk left arm (extended handing key) -->
  <line x1="170" y1="186" x2="140" y2="220" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Clerk right arm -->
  <line x1="192" y1="186" x2="210" y2="200" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Key card being handed over -->
  <rect x="100" y="214" width="64" height="40" fill="#FFE000" stroke="#1a1a1a" stroke-width="2" rx="4"/>
  <text x="132" y="230" font-family="Courier New, monospace" font-size="8" fill="#1a1a1a" text-anchor="middle" font-weight="700">_psid=</text>
  <text x="132" y="244" font-family="Courier New, monospace" font-size="8" fill="#1a1a1a" text-anchor="middle">abc123</text>
  <!-- Key card chip -->
  <rect x="108" y="220" width="12" height="10" fill="#F39C12" rx="1"/>

  <!-- GUEST (browser) character - right of desk -->
  <!-- Guest body -->
  <rect x="290" y="176" width="22" height="54" fill="#8E44AD" stroke="#1a1a1a" stroke-width="2" rx="4"/>
  <!-- Guest head -->
  <circle cx="301" cy="163" r="16" fill="#FFDAB9" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Guest eyes -->
  <circle cx="295" cy="161" r="2" fill="#1a1a1a"/>
  <circle cx="307" cy="161" r="2" fill="#1a1a1a"/>
  <!-- Guest happy expression -->
  <path d="M296 168 Q301 174 306 168" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Guest arm (receiving) -->
  <line x1="290" y1="186" x2="265" y2="215" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Guest right arm -->
  <line x1="312" y1="186" x2="330" y2="200" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Guest legs -->
  <line x1="295" y1="230" x2="291" y2="258" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="307" y1="230" x2="311" y2="258" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Browser label above guest -->
  <rect x="267" y="125" width="68" height="20" fill="#8E44AD" rx="3"/>
  <text x="301" y="139" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="700">Browser</text>

  <!-- Cookie arrow down label -->
  <text x="132" y="198" font-family="Arial, sans-serif" font-size="10" fill="#F39C12" text-anchor="middle" font-weight="700">Set-Cookie ↓</text>

  <!-- === RIGHT PANEL: Guest returns with key card === -->
  <text x="600" y="90" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="13" fill="#1a1a1a" text-anchor="middle">Next Request — Recognised!</text>

  <!-- Hotel desk / counter right panel -->
  <rect x="426" y="228" width="340" height="20" fill="#8B6914" stroke="#1a1a1a" stroke-width="2" rx="3"/>
  <rect x="426" y="238" width="340" height="50" fill="#A0782A" stroke="#1a1a1a" stroke-width="2" rx="2"/>
  <line x1="446" y1="248" x2="446" y2="285" stroke="#7A5A10" stroke-width="1.5"/>
  <line x1="506" y1="248" x2="506" y2="285" stroke="#7A5A10" stroke-width="1.5"/>
  <line x1="566" y1="248" x2="566" y2="285" stroke="#7A5A10" stroke-width="1.5"/>
  <line x1="626" y1="248" x2="626" y2="285" stroke="#7A5A10" stroke-width="1.5"/>
  <line x1="686" y1="248" x2="686" y2="285" stroke="#7A5A10" stroke-width="1.5"/>
  <line x1="746" y1="248" x2="746" y2="285" stroke="#7A5A10" stroke-width="1.5"/>

  <!-- "HOTEL SERVER" sign right panel -->
  <rect x="526" y="95" width="115" height="22" fill="#4A90D9" rx="3"/>
  <text x="583" y="111" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="11" fill="white" text-anchor="middle">HOTEL SERVER</text>

  <!-- CLERK (right panel) -->
  <rect x="566" y="176" width="22" height="54" fill="#27AE60" stroke="#1a1a1a" stroke-width="2" rx="4"/>
  <circle cx="577" cy="163" r="16" fill="#FFDAB9" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="571" cy="161" r="2" fill="#1a1a1a"/>
  <circle cx="583" cy="161" r="2" fill="#1a1a1a"/>
  <path d="M572 168 Q577 173 582 168" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <polygon points="572,178 577,182 582,178 577,174" fill="#E74C3C"/>
  <line x1="566" y1="186" x2="540" y2="200" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="588" y1="186" x2="610" y2="198" stroke="#1a1a1a" stroke-width="2"/>

  <!-- GUEST (right panel) returning with key card -->
  <rect x="690" y="176" width="22" height="54" fill="#8E44AD" stroke="#1a1a1a" stroke-width="2" rx="4"/>
  <circle cx="701" cy="163" r="16" fill="#FFDAB9" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="695" cy="161" r="2" fill="#1a1a1a"/>
  <circle cx="707" cy="161" r="2" fill="#1a1a1a"/>
  <path d="M696 168 Q701 174 706 168" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="690" y1="186" x2="660" y2="205" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="712" y1="186" x2="730" y2="200" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="695" y1="230" x2="691" y2="258" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="707" y1="230" x2="711" y2="258" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Browser label right panel -->
  <rect x="663" y="125" width="68" height="20" fill="#8E44AD" rx="3"/>
  <text x="697" y="139" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="700">Browser</text>

  <!-- Key card being presented by guest -->
  <rect x="640" y="200" width="58" height="36" fill="#FFE000" stroke="#1a1a1a" stroke-width="2" rx="4"/>
  <text x="669" y="215" font-family="Courier New, monospace" font-size="8" fill="#1a1a1a" text-anchor="middle" font-weight="700">_psid=</text>
  <text x="669" y="228" font-family="Courier New, monospace" font-size="8" fill="#1a1a1a" text-anchor="middle">abc123</text>
  <rect x="648" y="206" width="10" height="8" fill="#F39C12" rx="1"/>

  <!-- Cookie send label -->
  <text x="669" y="194" font-family="Arial, sans-serif" font-size="10" fill="#F39C12" text-anchor="middle" font-weight="700">Cookie: ↑</text>

  <!-- Recognition speech bubble from clerk -->
  <rect x="492" y="120" width="80" height="44" fill="white" stroke="#1a1a1a" stroke-width="2" rx="8"/>
  <polygon points="560,164 570,178 548,164" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="561,164 569,176 549,164" fill="white"/>
  <text x="532" y="138" font-family="Arial, sans-serif" font-size="11" fill="#1a1a1a" text-anchor="middle">Welcome</text>
  <text x="532" y="154" font-family="Arial, sans-serif" font-size="11" fill="#27AE60" text-anchor="middle" font-weight="700">back, Alice!</text>

  <!-- Bottom caption bar -->
  <rect x="2" y="330" width="796" height="46" fill="#1a1a1a" rx="6"/>
  <rect x="2" y="330" width="796" height="10" fill="#1a1a1a"/>
  <text x="400" y="358" font-family="Arial, sans-serif" font-size="15" fill="white" text-anchor="middle">Sessions: the server's memory of who you are.</text>
</svg>
