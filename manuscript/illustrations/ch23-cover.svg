<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <!-- Background -->
  <rect width="800" height="380" fill="#FFFEF0" rx="8"/>
  <!-- Outer border -->
  <rect x="2" y="2" width="796" height="376" fill="none" stroke="#1a1a1a" stroke-width="4" rx="6"/>
  <!-- Top title banner -->
  <rect x="2" y="4" width="796" height="60" fill="#1a1a1a" rx="6"/>
  <rect x="2" y="40" width="796" height="24" fill="#1a1a1a"/>
  <text x="400" y="42" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="22" fill="#FFE000" text-anchor="middle" dominant-baseline="middle">Chapter 23: Multi-Database Abstraction</text>

  <!-- ===== SINGLE WIDE PANEL ===== -->

  <!-- Central hub box -->
  <rect x="278" y="138" width="244" height="56" fill="#1a1a1a" stroke="#FFE000" stroke-width="3" rx="8"/>
  <text x="400" y="160" font-family="Arial, monospace, sans-serif" font-size="13" fill="#FFE000" text-anchor="middle" font-weight="bold">DBConnect::Open("dsn")</text>
  <text x="400" y="180" font-family="Arial, sans-serif" font-size="11" fill="#aaa" text-anchor="middle">connection factory</text>

  <!-- Branch line: left to SQLite -->
  <line x1="278" y1="166" x2="160" y2="200" stroke="#4A90D9" stroke-width="3"/>
  <!-- Branch line: top to PostgreSQL -->
  <line x1="400" y1="138" x2="400" y2="90" stroke="#8E44AD" stroke-width="3"/>
  <!-- Branch line: right to MySQL -->
  <line x1="522" y1="166" x2="640" y2="200" stroke="#E74C3C" stroke-width="3"/>

  <!-- === SQLite (left) === -->
  <!-- SQLite cylinder -->
  <ellipse cx="110" cy="214" rx="48" ry="16" fill="#4A90D9" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="62" y="214" width="96" height="60" fill="#4A90D9" stroke="#1a1a1a" stroke-width="2"/>
  <ellipse cx="110" cy="274" rx="48" ry="16" fill="#3A7FC9" stroke="#1a1a1a" stroke-width="2"/>
  <text x="110" y="240" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="13" fill="white" text-anchor="middle">SQLite</text>
  <text x="110" y="258" font-family="Arial, sans-serif" font-size="11" fill="#D0E8FF" text-anchor="middle">file-based</text>
  <!-- SQLite label below -->
  <text x="110" y="300" font-family="Arial, sans-serif" font-size="12" fill="#4A90D9" text-anchor="middle" font-weight="bold">sqlite://data.db</text>

  <!-- === PostgreSQL (top center) === -->
  <!-- Simple elephant head -->
  <!-- Elephant body (head) -->
  <ellipse cx="400" cy="90" rx="36" ry="30" fill="#8E44AD" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Elephant trunk -->
  <path d="M380 102 Q360 120 365 138 Q368 150 380 148" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
  <ellipse cx="381" cy="149" rx="8" ry="5" fill="#8E44AD" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Elephant eye -->
  <circle cx="388" cy="82" r="4" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="389" cy="82" r="2" fill="#1a1a1a"/>
  <!-- Elephant ear -->
  <ellipse cx="428" cy="84" rx="14" ry="20" fill="#6E24AD" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- PG label -->
  <text x="400" y="76" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="11" fill="white" text-anchor="middle">PG</text>
  <!-- PostgreSQL label below elephant -->
  <text x="400" y="168" font-family="Arial, sans-serif" font-size="12" fill="#8E44AD" text-anchor="middle" font-weight="bold">PostgreSQL</text>
  <text x="400" y="183" font-family="Arial, sans-serif" font-size="11" fill="#8E44AD" text-anchor="middle">postgres://host/db</text>

  <!-- === MySQL (right) === -->
  <!-- Simple dolphin icon -->
  <!-- Dolphin body -->
  <ellipse cx="668" cy="238" rx="42" ry="22" fill="#E74C3C" stroke="#1a1a1a" stroke-width="2" transform="rotate(-15 668 238)"/>
  <!-- Dolphin tail fin -->
  <polygon points="700,256 720,242 716,268" fill="#C0392B" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Dolphin snout -->
  <path d="M630 232 Q618 230 615 236 Q618 242 630 240" fill="#C0392B" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Dolphin eye -->
  <circle cx="638" cy="228" r="4" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="639" cy="228" r="2" fill="#1a1a1a"/>
  <!-- Dorsal fin -->
  <polygon points="660,218 670,196 680,218" fill="#C0392B" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- MySQL label -->
  <text x="668" y="242" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="10" fill="white" text-anchor="middle">MySQL</text>
  <!-- MySQL label below -->
  <text x="668" y="295" font-family="Arial, sans-serif" font-size="12" fill="#E74C3C" text-anchor="middle" font-weight="bold">MySQL</text>
  <text x="668" y="310" font-family="Arial, sans-serif" font-size="11" fill="#E74C3C" text-anchor="middle">mysql://host/db</text>

  <!-- Developer character holding key -->
  <!-- Body -->
  <rect x="182" y="175" width="20" height="38" fill="#27AE60" stroke="#1a1a1a" stroke-width="2" rx="4"/>
  <!-- Head -->
  <circle cx="192" cy="164" r="16" fill="#F39C12" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Happy eyes -->
  <path d="M186 161 Q188 158 190 161" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <path d="M194 161 Q196 158 198 161" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <!-- Smile -->
  <path d="M186 170 Q192 176 198 170" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <!-- Arm holding key up -->
  <line x1="182" y1="182" x2="160" y2="162" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Key icon -->
  <circle cx="152" cy="156" r="9" fill="#FFE000" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="152" cy="156" r="4" fill="#1a1a1a"/>
  <line x1="161" y1="156" x2="178" y2="156" stroke="#FFE000" stroke-width="3"/>
  <line x1="174" y1="156" x2="174" y2="162" stroke="#FFE000" stroke-width="2.5"/>
  <line x1="168" y1="156" x2="168" y2="160" stroke="#FFE000" stroke-width="2.5"/>
  <!-- DSN label on key -->
  <text x="152" y="175" font-family="Arial, sans-serif" font-size="10" fill="#1a1a1a" text-anchor="middle" font-weight="bold">DSN</text>
  <!-- Other arm -->
  <line x1="202" y1="182" x2="218" y2="196" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Legs -->
  <line x1="185" y1="213" x2="181" y2="240" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="199" y1="213" x2="203" y2="240" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Code snippet at bottom center -->
  <rect x="240" y="300" width="320" height="24" fill="#F0F0F0" stroke="#888" stroke-width="1" rx="3"/>
  <text x="400" y="316" font-family="Arial, monospace, sans-serif" font-size="13" fill="#1a1a1a" text-anchor="middle">db = DBConnect::Open(dsn)</text>

  <!-- Bottom caption bar -->
  <rect x="2" y="330" width="796" height="46" fill="#1a1a1a" rx="6"/>
  <rect x="2" y="330" width="796" height="10" fill="#1a1a1a"/>
  <text x="400" y="358" font-family="Arial, sans-serif" font-size="15" fill="white" text-anchor="middle">One API. Three databases. Your choice at deploy time.</text>
</svg>
