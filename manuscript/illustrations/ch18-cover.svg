<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <!-- Background -->
  <rect width="800" height="380" fill="#FFFEF0" rx="8"/>
  <!-- Outer border -->
  <rect x="2" y="2" width="796" height="376" fill="none" stroke="#1a1a1a" stroke-width="4" rx="6"/>
  <!-- Top title banner -->
  <rect x="2" y="4" width="796" height="60" fill="#1a1a1a" rx="6"/>
  <rect x="2" y="40" width="796" height="24" fill="#1a1a1a"/>
  <text x="400" y="42" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="22" fill="#FFE000" text-anchor="middle" dominant-baseline="middle">Chapter 18: Configuration and Logging</text>

  <!-- ===== SINGLE WIDE PANEL ===== -->

  <!-- ===== LEFT SIDE: Control panel with .env dials ===== -->

  <!-- .env file card -->
  <rect x="40" y="80" width="120" height="100" fill="white" stroke="#1a1a1a" stroke-width="2" rx="4"/>
  <rect x="40" y="80" width="120" height="20" fill="#4A90D9" rx="4"/>
  <rect x="40" y="96" width="120" height="4" fill="#4A90D9"/>
  <text x="100" y="94" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">.env</text>
  <text x="56" y="116" font-family="monospace, Arial, sans-serif" font-size="9" fill="#1a1a1a">PORT=8080</text>
  <text x="56" y="130" font-family="monospace, Arial, sans-serif" font-size="9" fill="#E74C3C">MODE=production</text>
  <text x="56" y="144" font-family="monospace, Arial, sans-serif" font-size="9" fill="#27AE60">DB_DSN=postgres://</text>
  <text x="56" y="158" font-family="monospace, Arial, sans-serif" font-size="9" fill="#8E44AD">LOG_LEVEL=warn</text>
  <text x="56" y="172" font-family="monospace, Arial, sans-serif" font-size="9" fill="#1a1a1a">SECRET=••••••</text>

  <!-- Arrow from .env to control panel -->
  <line x1="162" y1="130" x2="192" y2="165" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="186,168 196,172 192,160" fill="#1a1a1a"/>

  <!-- Control panel box -->
  <rect x="190" y="155" width="220" height="140" fill="#F0F0F0" stroke="#1a1a1a" stroke-width="3" rx="6"/>
  <rect x="190" y="155" width="220" height="22" fill="#1a1a1a" rx="4"/>
  <rect x="190" y="170" width="220" height="7" fill="#1a1a1a"/>
  <text x="300" y="170" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">CONTROL PANEL</text>

  <!-- Dial: PORT -->
  <circle cx="240" cy="220" r="22" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="240" cy="220" r="16" fill="#4A90D9" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="240" y1="220" x2="240" y2="207" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <text x="240" y="253" font-family="Arial, sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle" font-weight="bold">PORT</text>
  <text x="240" y="264" font-family="Arial, sans-serif" font-size="8" fill="#4A90D9" text-anchor="middle">8080</text>

  <!-- Dial: MODE -->
  <circle cx="300" cy="220" r="22" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="300" cy="220" r="16" fill="#E74C3C" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="300" y1="220" x2="310" y2="209" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <text x="300" y="253" font-family="Arial, sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle" font-weight="bold">MODE</text>
  <text x="300" y="264" font-family="Arial, sans-serif" font-size="8" fill="#E74C3C" text-anchor="middle">prod</text>

  <!-- Dial: DB_DSN -->
  <circle cx="360" cy="220" r="22" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="360" cy="220" r="16" fill="#27AE60" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="360" y1="220" x2="352" y2="208" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <text x="360" y="253" font-family="Arial, sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle" font-weight="bold">DB_DSN</text>
  <text x="360" y="264" font-family="Arial, sans-serif" font-size="8" fill="#27AE60" text-anchor="middle">postgres</text>

  <!-- Small indicator lights on panel -->
  <circle cx="220" cy="282" r="5" fill="#27AE60" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="240" cy="282" r="5" fill="#27AE60" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="260" cy="282" r="5" fill="#FFE000" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="280" cy="282" r="5" fill="#27AE60" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Developer character (relaxed, at controls) -->
  <!-- Body -->
  <rect x="108" y="215" width="22" height="42" fill="#8E44AD" stroke="#1a1a1a" stroke-width="2" rx="4"/>
  <!-- Head -->
  <circle cx="119" cy="202" r="18" fill="#F39C12" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Relaxed eyes (half-lidded) -->
  <path d="M112 200 Q114 198 116 200" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <path d="M121 200 Q123 198 125 200" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <!-- Calm smile -->
  <path d="M113 208 Q119 214 125 208" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <!-- Coffee cup in hand -->
  <line x1="108" y1="225" x2="90" y2="235" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="76" y="228" width="16" height="16" fill="#F39C12" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <path d="M92 232 Q96 232 96 238 Q96 244 92 244" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <!-- Other arm pointing at panel -->
  <line x1="130" y1="225" x2="188" y2="210" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Legs -->
  <line x1="112" y1="257" x2="108" y2="285" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="126" y1="257" x2="130" y2="285" stroke="#1a1a1a" stroke-width="2"/>

  <!-- ===== RIGHT SIDE: Logger output ===== -->

  <!-- Logger terminal -->
  <rect x="450" y="85" width="300" height="220" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="2" rx="6"/>
  <!-- Terminal title bar -->
  <rect x="450" y="85" width="300" height="24" fill="#333" rx="6"/>
  <rect x="450" y="101" width="300" height="8" fill="#333"/>
  <circle cx="466" cy="97" r="5" fill="#E74C3C"/>
  <circle cx="482" cy="97" r="5" fill="#FFE000"/>
  <circle cx="498" cy="97" r="5" fill="#27AE60"/>
  <text x="600" y="101" font-family="Arial, sans-serif" font-size="10" fill="#888" text-anchor="middle">logger output</text>

  <!-- Log lines -->
  <!-- INFO line -->
  <rect x="460" y="120" width="280" height="20" fill="#1a1a1a"/>
  <text x="468" y="134" font-family="monospace, Arial, sans-serif" font-size="11" fill="#4A90D9">[INFO]</text>
  <text x="518" y="134" font-family="monospace, Arial, sans-serif" font-size="11" fill="#888">2024/01/15 08:00:01</text>
  <text x="468" y="152" font-family="monospace, Arial, sans-serif" font-size="11" fill="white">Server starting on :8080</text>

  <!-- WARN line -->
  <rect x="460" y="162" width="280" height="20" fill="#1a1a1a"/>
  <text x="468" y="176" font-family="monospace, Arial, sans-serif" font-size="11" fill="#F39C12">[WARN]</text>
  <text x="518" y="176" font-family="monospace, Arial, sans-serif" font-size="11" fill="#888">2024/01/15 08:02:44</text>
  <text x="468" y="194" font-family="monospace, Arial, sans-serif" font-size="11" fill="white">DB retry attempt 2/3</text>

  <!-- ERROR line -->
  <rect x="460" y="204" width="280" height="20" fill="#1a1a1a"/>
  <text x="468" y="218" font-family="monospace, Arial, sans-serif" font-size="11" fill="#E74C3C">[ERROR]</text>
  <text x="524" y="218" font-family="monospace, Arial, sans-serif" font-size="11" fill="#888">2024/01/15 03:17:52</text>
  <text x="468" y="236" font-family="monospace, Arial, sans-serif" font-size="11" fill="white">Connection failed: timeout</text>

  <!-- INFO line 2 -->
  <rect x="460" y="246" width="280" height="20" fill="#1a1a1a"/>
  <text x="468" y="260" font-family="monospace, Arial, sans-serif" font-size="11" fill="#4A90D9">[INFO]</text>
  <text x="518" y="260" font-family="monospace, Arial, sans-serif" font-size="11" fill="#888">2024/01/15 09:00:00</text>
  <text x="468" y="278" font-family="monospace, Arial, sans-serif" font-size="11" fill="#27AE60">Request: GET /health 200</text>

  <!-- Blinking cursor -->
  <rect x="468" y="284" width="8" height="14" fill="#27AE60"/>

  <!-- Bottom caption bar -->
  <rect x="2" y="330" width="796" height="46" fill="#1a1a1a" rx="6"/>
  <rect x="2" y="330" width="796" height="10" fill="#1a1a1a"/>
  <text x="400" y="358" font-family="Arial, sans-serif" font-size="15" fill="white" text-anchor="middle">.env for config. Levelled logging for visibility.</text>
</svg>
