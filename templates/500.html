<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>500 Internal Server Error — PureSimple</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 10vh auto; padding: 0 1rem; color: #333; }
    h1   { font-size: 4rem; margin: 0; color: #c00; }
    p    { color: #666; }
    a    { color: #0057b7; }
  </style>
</head>
<body>
  <h1>500</h1>
  <h2>Internal Server Error</h2>
  <p>Something went wrong on our end. Please try again later.</p>
  {% if debug %}
  <pre style="background:#f5f5f5;padding:1rem;overflow:auto">{{ error }}</pre>
  {% endif %}
  <p><a href="/">Go home</a></p>
</body>
</html>
