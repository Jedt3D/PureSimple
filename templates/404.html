<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 Not Found — PureSimple</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 10vh auto; padding: 0 1rem; color: #333; }
    h1   { font-size: 4rem; margin: 0; color: #999; }
    p    { color: #666; }
    a    { color: #0057b7; }
  </style>
</head>
<body>
  <h1>404</h1>
  <h2>Page Not Found</h2>
  <p>The page you requested — <code>{{ request.path }}</code> — does not exist.</p>
  <p><a href="/">Go home</a></p>
</body>
</html>
